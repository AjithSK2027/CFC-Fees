<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coffeeland FC • Fees Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 12px;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 40px;
            height: 40px;
            background: #fbbf24;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
        .title h1 { color: white; font-size: 18px; font-weight: 600; }
        .title p { color: #737373; font-size: 11px; }
        .toggle-container {
            display: flex;
            gap: 6px;
            background: #1a1a1a;
            padding: 4px;
            border-radius: 40px;
            border: 1px solid #2a2a2a;
        }
        .toggle-option {
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            background: transparent;
            color: #737373;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .toggle-option.active { background: #fbbf24; color: #111111; }
        .total-collected {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 8px 16px;
        }
        .total-collected span { color: #737373; font-size: 12px; }
        .total-collected strong { color: #fbbf24; font-size: 14px; margin-left: 8px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 16px;
            padding: 16px;
        }
        .stat-label {
            color: #737373;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .stat-number { color: white; font-size: 20px; font-weight: 600; }
        .stat-number.gold { color: #fbbf24; }
        .filters {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .filters-grid { display: flex; flex-direction: column; gap: 12px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label {
            color: #737373;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .filter-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .button-group { display: flex; gap: 10px; margin-top: 4px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: #1a1a1a;
            color: white;
            border: 1px solid #2a2a2a;
            text-align: center;
        }
        .btn-primary { background: #fbbf24; color: #111111; border: none; }
        .table-container {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th {
            text-align: left;
            padding: 14px 12px;
            background: #1a1a1a;
            color: #737373;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid #222222;
        }
        td {
            padding: 12px;
            color: white;
            font-size: 13px;
            border-bottom: 1px solid #1a1a1a;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .status-paid { background: #05966920; color: #10b981; border: 1px solid #10b98130; }
        .status-pending { background: #d9770620; color: #f59e0b; border: 1px solid #f59e0b30; }
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .action-paid { background: #05966920; color: #10b981; border: 1px solid #10b98130; }
        .action-paid:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-remind { background: #fbbf2420; color: #fbbf24; border: 1px solid #fbbf2430; }
        .action-edit { background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f630; }
        .whatsapp-number { color: #fbbf24; font-size: 12px; cursor: pointer; }
        .whatsapp-number:hover { text-decoration: underline; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-content {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
        }
        .modal-content h3 { color: white; font-size: 18px; margin-bottom: 16px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .toast {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 13px;
            text-align: center;
            transform: translateY(100px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }
        .toast.show { transform: translateY(0); }
        .empty-state { text-align: center; padding: 40px; color: #737373; font-size: 14px; }
        .helper-text { color: #737373; font-size: 10px; margin-top: 4px; }
        .contact-note {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo">
                    <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" alt="Coffeeland FC">
                </div>
                <div class="title">
                    <h1>Coffeeland FC</h1>
                    <p>Fee Management</p>
                </div>
            </div>
            <div class="toggle-container">
                <button class="toggle-option active" id="toggleRegular" onclick="setFeeType('regular')">Regular</button>
                <button class="toggle-option" id="toggleSummer" onclick="setFeeType('summer')">Summer</button>
            </div>
            <div class="total-collected">
                <span>Collected</span>
                <strong id="totalCollected">₹0</strong>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total fees</div>
                <div class="stat-number gold" id="totalFees">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Collected</div>
                <div class="stat-number" id="collected">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-number" id="pending">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Collection rate</div>
                <div class="stat-number" id="collectionRate">0%</div>
            </div>
        </div>

        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Batch</label>
                    <select id="batchSelect" onchange="loadStudents()">
                        <option value="">Select batch</option>
                        <option value="Kalyan Nagar">Kalyan Nagar</option>
                        <option value="Xavier's School">Xavier's School</option>
                        <option value="Monti Angels">Monti Angels</option>
                        <option value="District Field Morning">District Field Morning</option>
                        <option value="District Field Evening">District Field Evening</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Month</label>
                    <select id="monthSelect" onchange="loadStudents()">
                        <option value="Jan 2026">Jan 2026</option>
                        <option value="Feb 2026">Feb 2026</option>
                        <option value="Mar 2026">Mar 2026</option>
                        <option value="Apr 2026">Apr 2026</option>
                        <option value="May 2026">May 2026</option>
                        <option value="Jun 2026">Jun 2026</option>
                        <option value="Jul 2026">Jul 2026</option>
                        <option value="Aug 2026">Aug 2026</option>
                        <option value="Sep 2026">Sep 2026</option>
                        <option value="Oct 2026">Oct 2026</option>
                        <option value="Nov 2026">Nov 2026</option>
                        <option value="Dec 2026">Dec 2026</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="statusSelect" onchange="filterTable()">
                        <option value="all">All</option>
                        <option value="Paid">Paid</option>
                        <option value="Pending">Pending</option>
                    </select>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="applyDefaultFees()">Apply Default</button>
                    <button class="btn" onclick="syncData()">Sync All</button>
                </div>
            </div>
        </div>

        <div class="contact-note" id="contactNote" style="display: none;">
            📱 <span id="contactNoteText"></span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Batch</th>
                        <th>Month</th>
                        <th>WhatsApp</th>
                        <th>Total</th>
                        <th>Paid</th>
                        <th>Pending</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="empty-state">Select a batch and month</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="whatsappModal">
        <div class="modal-content">
            <h3>Update WhatsApp</h3>
            <input type="text" id="whatsappInput" placeholder="Enter number (e.g., 919876543210)">
            <div class="helper-text">This will be saved to Master Contacts sheet for all months</div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="saveWhatsApp()">Save</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal" id="feesModal">
        <div class="modal-content">
            <h3>Set Total Fees</h3>
            <input type="number" id="feesInput" placeholder="Enter amount" min="1">
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="saveFees()">Save</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Configuration
        const SHEET_ID = '1EhkGO3omreFx_cbIWM9ZMQbTtWkTT2tm4ePgN-Ii8GQ';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzaNyTxkqd5cAqDi6ALwivDAkBWa79osUbVKe8OscwkELF0qGvJaQ8-1ug95rg5Ap9W/exec';

        const FEES = {
            regular: {
                'Kalyan Nagar': 1200,
                'Xavier\'s School': 500,
                'District Field Morning': 800,
                'District Field Evening': 800
            },
            summer: {
                'Kalyan Nagar': 1500,
                'District Field Morning': 1000,
                'District Field Evening': 1000
            }
        };

        const STUDENTS = {
            'Kalyan Nagar': [
                'MOHITH.S', 'Rishanth R Shekar', 'Gahan', 'RUTVIK', 'Sohan R Prasad',
                'Gagan gowda.B.M', 'Mohith T', 'Gokul', 'THEJAS KN', 'CHIRANTH BK',
                'Shrinik U Y', 'HIMAVANTH CJ', 'Ganav r', 'SHAMAN GOWDA N N',
                'SHRIMAN GOWDA N N', 'Dhanvith p Gowda', 'Dhanyatha p', 'Swayam',
                'Samanvith Rao D M', 'Sai pranav', 'Dishanth HL', 'Manvith.S',
                'RAJATH .S', 'Nishanth S. V', 'Hoysala M Hrushikesh'
            ],
            'Xavier\'s School': [
                'AIMA', 'PREETHAM HM', 'SAMBRAMA.S', 'DHANVISH', 'VISMITHA',
                'YASHWANTH BJ', 'ULLAS', 'JASHITH C', 'SAMARTH', 'SARVAJITH',
                'THANUSH', 'PUNITH', 'PAVAN', 'BHUVAN S', 'CHIRANTH', 'AARIZ',
                'RIVON', 'DEEKSHA', 'PRAJWAL', 'ANHAR', 'UMAIR', 'AVINASH',
                'LIKITH', 'SOHAN', 'KRUTHIK', 'SAAMAR', 'LIKITHA', 'IBRAHIM',
                'MALCUM', 'SAMARTH B', 'VINISH', 'SHAUN D', 'GOKUL', 'CHIRANJITH M',
                'HUSNA', 'ASJAD', 'IMPAN'
            ],
            'Monti Angels': [
                'MD IFAZ', 'AAHIL', 'MD RAAFI', 'MD AAZZ', 'UMAR', 'UNAIZ',
                'AFFAN', 'RISHAN', 'MD ARHAAN', 'MD YUSUF ARMAN', 'KSHAMAN U.G',
                'RISHIK PONNAPPA', 'IRSHAD BAIG', 'MD HAMZA', 'SK SAMDHANI',
                'MD SHAYAN', 'MD UMAR', 'NOUFAL U.S', 'MD RIFAHATH', 'MD ARHAN',
                'MD ARMAAN NAWAZ', 'MD MUBASHER', 'ABDUL AZEEM', 'SHINAF IBRAHIM',
                'ANTHONY', 'TANISH SHANBOGH', 'MOHAN GOWDA', 'MOHAMMED SHARIQ',
                'MD RAHIL', 'SK AZIZ', 'AMAN BAIG', 'HARSHAVARDHANA', 'MD RAYAAN',
                'AARIZ RAZA', 'MEHHAROOF', 'PAYAM', 'PAIMAN', 'RISHAB', 'TALHA',
                'RAHIL', 'ISMAIL', 'YADHUVAMSHIK', 'AFNAN', 'SHISHIR'
            ],
            'District Field Morning': ['Arjun', 'Rahul'],
            'District Field Evening': ['Karthik', 'Suresh']
        };

        let currentFeeType = 'regular';
        let currentBatch = '';
        let currentMonth = 'Jan 2026';
        let students = [];
        let contacts = {}; // Master contacts from sheet
        let selectedStudent = null;
        let timeout;

        window.onload = () => {
            setFeeType('regular');
            loadContacts();
        };

        async function loadContacts() {
            try {
                const url = `${WEB_APP_URL}?action=getContacts&sheetId=${SHEET_ID}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.success && data.data) {
                    contacts = {};
                    data.data.forEach(c => {
                        contacts[c.studentName] = c.whatsapp;
                    });
                    document.getElementById('contactNoteText').textContent = 
                        `📞 ${Object.keys(contacts).length} contacts loaded from master sheet`;
                    document.getElementById('contactNote').style.display = 'flex';
                }
            } catch (error) {
                console.error('Load contacts error:', error);
            }
        }

        function setFeeType(type) {
            currentFeeType = type;
            document.getElementById('toggleRegular').classList.remove('active');
            document.getElementById('toggleSummer').classList.remove('active');
            document.getElementById(`toggle${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.add('active');
            
            const monthSelect = document.getElementById('monthSelect');
            if (type === 'summer') {
                monthSelect.innerHTML = '<option value="Summer Camp 2026">Summer Camp 2026</option>';
                currentMonth = 'Summer Camp 2026';
            } else {
                monthSelect.innerHTML = `
                    <option value="Jan 2026">Jan 2026</option>
                    <option value="Feb 2026">Feb 2026</option>
                    <option value="Mar 2026">Mar 2026</option>
                    <option value="Apr 2026">Apr 2026</option>
                    <option value="May 2026">May 2026</option>
                    <option value="Jun 2026">Jun 2026</option>
                    <option value="Jul 2026">Jul 2026</option>
                    <option value="Aug 2026">Aug 2026</option>
                    <option value="Sep 2026">Sep 2026</option>
                    <option value="Oct 2026">Oct 2026</option>
                    <option value="Nov 2026">Nov 2026</option>
                    <option value="Dec 2026">Dec 2026</option>
                `;
                currentMonth = 'Jan 2026';
            }
            loadStudents();
        }

        async function loadStudents() {
            const batch = document.getElementById('batchSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            if (!batch || !month) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty-state">Select a batch and month</td></tr>';
                return;
            }
            
            currentBatch = batch;
            currentMonth = month;
            
            const studentList = STUDENTS[batch] || [];
            
            students = studentList.map(name => ({
                studentName: name,
                batch: batch,
                month: month,
                feeType: currentFeeType,
                whatsapp: contacts[name] || '', // Use from master contacts
                totalFees: 0,
                paid: 0,
                pending: 0,
                status: 'Pending'
            }));
            
            await loadFromSheet();
        }

        async function loadFromSheet() {
            try {
                const url = `${WEB_APP_URL}?action=getFees&batch=${currentBatch}&month=${currentMonth}&feeType=${currentFeeType}&sheetId=${SHEET_ID}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    const savedMap = {};
                    data.data.forEach(saved => {
                        savedMap[saved.studentName] = {
                            totalFees: saved.totalFees || 0,
                            paid: saved.paid || 0,
                            pending: saved.pending || 0,
                            status: saved.status || 'Pending'
                        };
                    });
                    
                    students = students.map(student => {
                        const saved = savedMap[student.studentName];
                        if (saved) {
                            return {
                                ...student,
                                totalFees: saved.totalFees,
                                paid: saved.paid,
                                pending: saved.pending,
                                status: saved.status
                            };
                        }
                        return student;
                    });
                }
                
                renderTable();
                calculateStats();
            } catch (error) {
                console.error('Load error:', error);
                renderTable();
                calculateStats();
            }
        }

        function renderTable() {
            const status = document.getElementById('statusSelect').value;
            let filtered = status !== 'all' ? students.filter(s => s.status === status) : students;
            
            if (filtered.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty-state">No students found</td></tr>';
                return;
            }
            
            let html = '';
            filtered.forEach(s => {
                const statusClass = s.status === 'Paid' ? 'status-paid' : 'status-pending';
                const whatsappDisplay = s.whatsapp ? 
                    `<span class="whatsapp-number" onclick="editWhatsApp('${s.studentName}')">${s.whatsapp}</span>` : 
                    `<button class="action-btn action-edit" onclick="editWhatsApp('${s.studentName}')">Add WhatsApp</button>`;
                
                html += `
                    <tr>
                        <td>${s.studentName}</td>
                        <td>${s.batch}</td>
                        <td>${s.month}</td>
                        <td>${whatsappDisplay}</td>
                        <td>${s.totalFees ? `₹${s.totalFees}` : `<button class="action-btn action-edit" onclick="editFees('${s.studentName}')">Set Fee</button>`}</td>
                        <td>₹${s.paid}</td>
                        <td>₹${s.pending}</td>
                        <td><span class="status-badge ${statusClass}">${s.status}</span></td>
                        <td>
                            <div class="action-buttons">
                                ${s.status !== 'Paid' && s.totalFees ? 
                                    `<button class="action-btn action-paid" onclick="markPaid('${s.studentName}')">Mark Paid</button>` : 
                                    s.status === 'Paid' ? `<button class="action-btn action-paid" disabled>Paid ✓</button>` : ''
                                }
                                <button class="action-btn action-remind" onclick="sendReminder('${s.studentName}')">Remind</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('tableBody').innerHTML = html;
        }

        function calculateStats() {
            let total = 0, paid = 0;
            students.forEach(s => {
                total += s.totalFees || 0;
                paid += s.paid || 0;
            });
            const rate = total > 0 ? Math.round((paid / total) * 100) : 0;
            
            document.getElementById('totalFees').textContent = `₹${total.toLocaleString()}`;
            document.getElementById('collected').textContent = `₹${paid.toLocaleString()}`;
            document.getElementById('pending').textContent = `₹${(total - paid).toLocaleString()}`;
            document.getElementById('collectionRate').textContent = `${rate}%`;
            document.getElementById('totalCollected').textContent = `₹${paid.toLocaleString()}`;
        }

        function applyDefaultFees() {
            if (!currentBatch) {
                showToast('Select a batch first', 'error');
                return;
            }
            const amount = FEES[currentFeeType]?.[currentBatch];
            if (amount) {
                let count = 0;
                students.forEach(s => {
                    if (!s.totalFees) {
                        s.totalFees = amount;
                        s.pending = amount - s.paid;
                        count++;
                    }
                });
                renderTable();
                calculateStats();
                showToast(`✨ Applied ₹${amount} to ${count} students ✨`, 'success');
            } else {
                showToast('No default fee for this batch', 'error');
            }
        }

        async function markPaid(name) {
            const student = students.find(s => s.studentName === name);
            if (!student?.totalFees) {
                showToast('Set total fees first', 'error');
                return;
            }
            if (!confirm(`🎉 Mark ${name} as paid?`)) return;
            
            student.paid = student.totalFees;
            student.pending = 0;
            student.status = 'Paid';
            await saveStudent(student);
            renderTable();
            calculateStats();
            showToast(`🎉 ${name} marked as paid!`, 'success');
        }

        async function saveStudent(student) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveFees', sheetId: SHEET_ID, student })
                });
            } catch (error) {
                console.error('Save error:', error);
            }
        }

        async function updateContact(studentName, batch, whatsapp) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'updateContact', 
                        sheetId: SHEET_ID, 
                        contact: { studentName, batch, whatsapp }
                    })
                });
                // Update local contacts cache
                contacts[studentName] = whatsapp;
            } catch (error) {
                console.error('Update contact error:', error);
            }
        }

        function editWhatsApp(name) {
            selectedStudent = students.find(s => s.studentName === name);
            document.getElementById('whatsappInput').value = selectedStudent?.whatsapp || '';
            document.getElementById('whatsappModal').style.display = 'flex';
        }

        async function saveWhatsApp() {
            const whatsapp = document.getElementById('whatsappInput').value.trim();
            if (selectedStudent) {
                selectedStudent.whatsapp = whatsapp;
                // Save to master contacts sheet
                await updateContact(selectedStudent.studentName, selectedStudent.batch, whatsapp);
                await saveStudent(selectedStudent);
                renderTable();
                closeModal();
                showToast('📱 WhatsApp saved to master contacts! Works for all months.', 'success');
            }
        }

        function editFees(name) {
            selectedStudent = students.find(s => s.studentName === name);
            document.getElementById('feesInput').value = selectedStudent?.totalFees || '';
            document.getElementById('feesModal').style.display = 'flex';
        }

        async function saveFees() {
            const amount = parseFloat(document.getElementById('feesInput').value);
            if (amount && selectedStudent) {
                selectedStudent.totalFees = amount;
                selectedStudent.pending = amount - (selectedStudent.paid || 0);
                selectedStudent.status = selectedStudent.pending <= 0 ? 'Paid' : 'Pending';
                await saveStudent(selectedStudent);
                renderTable();
                calculateStats();
                closeModal();
                showToast('💰 Fees saved!', 'success');
            }
        }

        function sendReminder(name) {
            const student = students.find(s => s.studentName === name);
            if (!student?.whatsapp) {
                showToast('Add WhatsApp number first', 'error');
                return;
            }
            const phone = student.whatsapp.replace(/\D/g, '');
            const message = `Hey! 👋%0a%0aThis is your friendly Coffeeland FC fee reminder! 🫶⚽%0a%0a━━━━━━━━━━━━━━━━%0a📋 *Your Summary*%0a━━━━━━━━━━━━━━━━%0a👤 *Student:* ${student.studentName}%0a🏃 *Batch:* ${student.batch}%0a📅 *Month:* ${student.month}%0a━━━━━━━━━━━━━━━━%0a💰 *Fee Details*%0a━━━━━━━━━━━━━━━━%0a💵 Total: ₹${student.totalFees}%0a✅ Paid: ₹${student.paid}%0a⏳ Pending: ₹${student.pending}%0a━━━━━━━━━━━━━━━━%0a%0a⚽ *Payment:* UPI: coffeeland@okhdfcbank%0a%0aDrop a message after payment! 📱%0a%0a– Coffeeland FC Team 💛🖤`;
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
            showToast('✨ WhatsApp opened!', 'success');
        }

        async function syncData() {
            for (const student of students) {
                await saveStudent(student);
            }
            showToast('🔄 All data synced to sheet!', 'success');
        }

        function filterTable() { renderTable(); }
        
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            clearTimeout(timeout);
            timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function closeModal() {
            document.getElementById('whatsappModal').style.display = 'none';
            document.getElementById('feesModal').style.display = 'none';
        }
        
        window.onclick = (e) => { if (e.target.classList.contains('modal')) closeModal(); };
    </script>
</body>
</html>

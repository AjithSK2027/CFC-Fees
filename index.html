<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFC Fees | Elite Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #080605; color: #F5E6D3; font-family: 'Outfit', sans-serif; background-attachment: fixed; }
        .glass-card { background: rgba(20, 15, 12, 0.7); border: 1px solid rgba(212, 175, 55, 0.15); backdrop-filter: blur(12px); }
        .input-gold { background: rgba(0,0,0,0.6); border: 1px solid rgba(212, 175, 55, 0.2); color: white; border-radius: 12px; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .pending { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.3); }
        .paid { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.3); }
        #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #080605 90%, transparent); padding: 25px; z-index: 50; }
        .remind-1 { background: rgba(234, 179, 8, 0.1); color: #EAB308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .remind-2 { background: rgba(249, 115, 22, 0.1); color: #F97316; border: 1px solid rgba(249, 115, 22, 0.3); }
        .remind-3 { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="p-4 pb-40">

    <div id="qrModal" onclick="closeQR()">
        <div class="glass-card p-8 rounded-[2.5rem] text-center space-y-5 max-w-xs w-full border-[#D4AF37]/40" onclick="event.stopPropagation()">
            <h3 class="text-[#D4AF37] font-black uppercase text-xs tracking-widest">CFC Official Payment</h3>
            <div class="bg-white p-4 rounded-3xl inline-block shadow-2xl">
                <img id="staticQR" src="https://i.ibb.co/f5dYVM1/Whats-App-Image-2026-04-08-at-12-56-51-PM.jpg" alt="CFC QR" class="w-52 h-52 object-contain">
            </div>
            <p class="text-white font-black text-3xl" id="qrPriceDisplay">₹0</p>
            <button onclick="closeQR()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-bold text-xs uppercase tracking-widest">Close</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase leading-none">Coffeeland <span class="text-[#D4AF37]">FC</span></h1>
                <p class="text-[#D4AF37]/50 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Elite Fee Management</p>
            </div>
            <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-14 w-14 rounded-full border-2 border-[#D4AF37]/50 p-1">
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <select id="batchSelect" onchange="loadStudents()" class="input-gold p-4 text-sm font-bold w-full">
                <option value="">-- Select Batch --</option>
            </select>
            <input type="month" id="feeMonth" class="input-gold p-4 text-sm font-bold w-full">
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase font-black text-white/30 tracking-[0.15em]">
                        <tr>
                            <th class="p-6">Athlete Profile</th>
                            <th class="p-6">Method / PST</th>
                            <th class="p-6">Expected</th>
                            <th class="p-6">Paid</th>
                            <th class="p-6">Balance</th>
                            <th class="p-6 text-center">Status & Actions</th>
                        </tr>
                    </thead>
                    <tbody id="roster" class="divide-y divide-white/5 font-medium">
                        <tr><td colspan="6" class="p-32 text-center text-[#D4AF37]/20 italic font-bold">SELECT BATCH TO START...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <div class="max-w-6xl mx-auto">
            <button onclick="submitFees()" id="syncBtn" class="w-full bg-gradient-to-r from-[#D4AF37] to-[#B89328] text-black font-black rounded-2xl py-5 text-[11px] uppercase tracking-[0.2em] shadow-xl transition-all active:scale-[0.98]">
                Synchronize Cloud Ledger
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhMqGlvOjcYsMVD20whdfoXhrlH4ukCUqumBO4tcwi6d9-I4o88H3jtcoFWVbHOdYEYg/exec"; 
        let students = [];

        window.onload = async () => {
            document.getElementById('feeMonth').value = new Date().toISOString().slice(0, 7);
            const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
            const d = await r.json();
            const s = document.getElementById('batchSelect');
            d.batches.forEach(b => s.innerHTML += `<option value="${b.name}">${b.name}</option>`);
        };

        async function loadStudents() {
            const b = document.getElementById('batchSelect').value;
            if(!b) return;
            const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}`);
            const d = await r.json();
            students = (d.students || []).map(s => ({...s, remindCount: 0}));
            render();
        }

        function render() {
            const tbody = document.getElementById('roster');
            tbody.innerHTML = '';
            students.forEach((s, i) => {
                const fee = parseFloat(s.fees) || 0;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-6">
                            <div class="font-bold text-white text-base">${s.name}</div>
                            <div class="text-[10px] text-[#D4AF37] font-black opacity-80 mt-1">📱 ${s.contact}</div>
                        </td>
                        <td class="p-6 space-y-2">
                            <div class="flex gap-2">
                                <select id="type-${i}" class="input-gold text-[10px] p-2 flex-1 font-bold"><option>UPI</option><option>CASH</option></select>
                                <button onclick="showQR(${fee})" class="bg-[#D4AF37] text-black rounded-lg px-3 text-[9px] font-black uppercase">QR</button>
                            </div>
                            <input id="pst-${i}" type="text" placeholder="Paid To..." class="input-gold text-[10px] p-2 w-full font-bold">
                        </td>
                        <td class="p-6 font-bold text-white/30 text-base">₹${fee}</td>
                        <td class="p-6"><input type="number" id="paid-${i}" value="0" oninput="calc(${i}, ${fee})" class="input-gold w-24 p-3 font-black text-emerald-400 text-center text-lg"></td>
                        <td class="p-6">
                            <div id="pend-${i}" class="font-black text-rose-500 text-lg">₹${fee}</div>
                            <span id="stat-${i}" class="status-badge pending">Pending</span>
                        </td>
                        <td class="p-6">
                            <div id="action-area-${i}" class="flex flex-col gap-2">
                                <button onclick="sendWA(${i}, 'received')" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-xl py-3 text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all">Confirm Receipt</button>
                                <button onclick="sendWA(${i}, 'remind')" id="remind-btn-${i}" class="bg-white/5 text-white/40 border border-white/10 rounded-xl py-3 text-[10px] font-black uppercase">Send Reminder</button>
                            </div>
                            <div id="last-remind-${i}" class="text-[9px] text-white/20 italic mt-2 text-center font-bold"></div>
                        </td>
                    </tr>`;
            });
        }

        function showQR(amount) { 
            document.getElementById('qrPriceDisplay').innerText = `₹${amount}`;
            document.getElementById('qrModal').style.display = 'flex'; 
        }

        function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

        function calc(i, total) {
            const paid = parseFloat(document.getElementById(`paid-${i}`).value) || 0;
            const pend = total - paid;
            document.getElementById(`pend-${i}`).innerText = `₹${pend}`;
            const s = document.getElementById(`stat-${i}`);
            const actionArea = document.getElementById(`action-area-${i}`);

            if (pend <= 0) {
                s.innerText = "Paid";
                s.className = `status-badge paid`;
                // Show ONLY the Send Receipt button when fully paid
                actionArea.innerHTML = `
                    <button onclick="sendWA(${i}, 'received')" class="bg-emerald-500 text-black rounded-xl py-3 text-[10px] font-black uppercase shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">Send Receipt ✅</button>
                `;
            } else {
                s.innerText = "Pending";
                s.className = `status-badge pending`;
                // Restore buttons if amount is edited
                actionArea.innerHTML = `
                    <button onclick="sendWA(${i}, 'received')" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-xl py-3 text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all">Confirm Receipt</button>
                    <button onclick="sendWA(${i}, 'remind')" id="remind-btn-${i}" class="bg-white/5 text-white/40 border border-white/10 rounded-xl py-3 text-[10px] font-black uppercase">Send Reminder</button>
                `;
            }
        }

       function sendWA(i, type) {
            const s = students[i];
            const paid = document.getElementById(`paid-${i}`).value || 0;
            const pend = document.getElementById(`pend-${i}`).innerText;
            const rawMonth = document.getElementById('feeMonth').value;
            const monthName = new Date(rawMonth + "-01").toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            
            // Format phone number to include +91 correctly
            let cleanContact = s.contact.toString().replace(/\D/g, ''); // Remove non-digits
            if (!cleanContact.startsWith('91')) {
                cleanContact = '91' + cleanContact;
            }
            
            let text = "";

            if (type === 'remind') {
                s.remindCount = (s.remindCount || 0) + 1;
                const btn = document.getElementById(`remind-btn-${i}`);
                const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

                if (s.remindCount === 1) {
                    btn.className = "remind-1 rounded-xl py-3 text-[10px] font-black uppercase transition-all";
                    text = `⚽ *COFFEELAND FC: FEE NOTICE* ⚽\n\nDear Sir/Madam,\n\nThis is a respectful reminder regarding the football training fees for *${s.name}* for the month of ${monthName}.\n\n*Total Fees:* ₹${s.fees}\n*Outstanding Balance:* ${pend}\n\nYou may kindly settle the dues via UPI: https://upi.pe/8867742269@ptaxis \n\nThank you for your continued support.\n\nRegards,\n*Management, Coffeeland FC*`;
                } else if (s.remindCount === 2) {
                    btn.className = "remind-2 rounded-xl py-3 text-[10px] font-black uppercase transition-all";
                    text = `⚽ *COFFEELAND FC: PAYMENT FOLLOW-UP* ⚽\n\nDear Sir/Madam,\n\nWe are following up regarding the pending training fees for *${s.name}* (${monthName}). We request you to kindly clear the balance of ${pend} at your earliest convenience.\n\n*UPI Link:* https://upi.pe/8867742269@ptaxis \n\nThank you,\n*Team CFC*`;
                } else {
                    btn.className = "remind-3 rounded-xl py-3 text-[10px] font-black uppercase transition-all";
                    text = `⚽ *COFFEELAND FC: URGENT NOTICE* ⚽\n\nDear Sir/Madam,\n\nOur records indicate that the training fees for *${s.name}* for ${monthName} remain outstanding (${pend}). We request you to kindly prioritize this payment today.\n\n*UPI:* 8867742269@ptaxis\n\n_If already paid, please share the screenshot for our records._`;
                }
                document.getElementById(`last-remind-${i}`).innerText = `Last sent at ${now} (x${s.remindCount})`;
            } else {
                const statusMsg = (pend === "₹0") ? "*Full Payment Received*" : `*Partial Payment Received* (Remaining: ${pend})`;
                text = `✅ *COFFEELAND FC: PAYMENT ACKNOWLEDGMENT* ✅\n\nDear Sir/Madam,\n\nWe have successfully received the payment of ₹${paid} for *${s.name}* towards ${monthName} training fees.\n\n*Current Status:* ${statusMsg}\n\nThank you for your promptness. We look forward to seeing the athlete at the next session!\n\nRegards,\n*Management, Coffeeland Football Club*`;
                
                if (pend === "₹0") {
                    document.getElementById(`action-area-${i}`).innerHTML = `
                        <div class="flex flex-col items-center justify-center p-2 bg-emerald-500/10 rounded-2xl border border-emerald-500/20">
                            <span class="text-emerald-500 text-[10px] font-black uppercase">✅ Verified</span>
                        </div>`;
                }
            }
            
            // Using the cleaned contact with 91 prefix
            window.open(`https://wa.me/${cleanContact}?text=${encodeURIComponent(text)}`);
        }
        async function submitFees() {
            const btn = document.getElementById('syncBtn');
            const logs = students.map((s, i) => ({
                name: s.name, contact: s.contact, batch: s.batch, fees: s.fees,
                feeType: document.getElementById(`type-${i}`)?.value || "N/A",
                paidTo: document.getElementById(`pst-${i}`)?.value || "N/A",
                paidAmount: document.getElementById(`paid-${i}`)?.value || 0,
                pending: document.getElementById(`pend-${i}`).innerText.replace('₹', ''),
                status: document.getElementById(`stat-${i}`).innerText,
                lastReminded: s.lastReminded || ""
            })).filter(r => parseFloat(r.paidAmount) > 0 || r.lastReminded !== "");

            if(!logs.length) return alert("Nothing new to sync.");
            btn.innerText = "UPDATING CLOUD DATABASE..."; btn.disabled = true;
            
            const fd = new URLSearchParams();
            fd.append('payload', JSON.stringify({ action: 'sync', month: document.getElementById('feeMonth').value, data: logs }));
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
                alert("Success! Cloud Ledger Synchronized.");
                loadStudents();
            } catch(e) { alert("Error: " + e.message); } 
            finally { btn.innerText = "Synchronize Cloud Ledger"; btn.disabled = false; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFC Fees | Elite Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #080605; color: #F5E6D3; font-family: 'Outfit', sans-serif; background-attachment: fixed; }
        .glass-card { background: rgba(20, 15, 12, 0.7); border: 1px solid rgba(212, 175, 55, 0.15); backdrop-filter: blur(12px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-gold { background: rgba(0,0,0,0.6); border: 1px solid rgba(212, 175, 55, 0.2); color: white; border-radius: 12px; transition: all 0.3s ease; }
        .input-gold:focus { border-color: #D4AF37; outline: none; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .pending { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.3); }
        .paid { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.3); }
        #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #080605 90%, transparent); padding: 25px; z-index: 50; }
        tr { transition: background 0.2s; }
        .remind-1 { background: rgba(234, 179, 8, 0.1); color: #EAB308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .remind-2 { background: rgba(249, 115, 22, 0.1); color: #F97316; border: 1px solid rgba(249, 115, 22, 0.3); }
        .remind-3 { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="p-4 pb-40">

    <div id="qrModal" onclick="closeQR()">
        <div class="glass-card p-8 rounded-[2.5rem] text-center space-y-5 max-w-xs w-full border-[#D4AF37]/40" onclick="event.stopPropagation()">
            <div class="flex justify-center"><div class="w-12 h-1 bg-[#D4AF37]/20 rounded-full mb-2"></div></div>
            <h3 class="text-[#D4AF37] font-black uppercase text-xs tracking-widest">CFC Official Payment</h3>
            <div class="bg-white p-4 rounded-3xl inline-block shadow-2xl">
                <img id="staticQR" src="https://i.ibb.co/f5dYVM1/Whats-App-Image-2026-04-08-at-12-56-51-PM.jpg" alt="CFC QR" class="w-52 h-52 object-contain">
            </div>
            <div>
                <p class="text-white/40 font-bold text-[10px] uppercase tracking-tighter">Amount to Pay</p>
                <p class="text-white font-black text-3xl" id="qrPriceDisplay">₹0</p>
            </div>
            <button onclick="closeQR()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-bold text-xs uppercase tracking-widest hover:bg-white/10 transition-all">Close</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase leading-none">Coffeeland <span class="text-[#D4AF37]">FC</span></h1>
                <p class="text-[#D4AF37]/50 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Elite Fee Management System</p>
            </div>
            <div class="relative">
                <div class="absolute inset-0 bg-[#D4AF37] blur-lg opacity-20 rounded-full"></div>
                <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-14 w-14 rounded-full border-2 border-[#D4AF37]/50 p-1 relative z-10">
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-[#D4AF37]/60 ml-2">Active Batch</label>
                <select id="batchSelect" onchange="loadStudents()" class="input-gold p-4 text-sm font-bold w-full appearance-none">
                    <option value="">-- Select Batch --</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-[#D4AF37]/60 ml-2">Billing Month</label>
                <input type="month" id="feeMonth" class="input-gold p-4 text-sm font-bold w-full">
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase font-black text-white/30 tracking-[0.15em]">
                        <tr>
                            <th class="p-6">Athlete Profile</th>
                            <th class="p-6">Transaction Info</th>
                            <th class="p-6">Fee</th>
                            <th class="p-6">Paid Amount</th>
                            <th class="p-6">Outstanding</th>
                            <th class="p-6 text-center">Status & Actions</th>
                        </tr>
                    </thead>
                    <tbody id="roster" class="divide-y divide-white/5 font-medium">
                        <tr><td colspan="6" class="p-32 text-center text-[#D4AF37]/20 italic font-bold tracking-widest">AWAITING BATCH SELECTION...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <div class="max-w-6xl mx-auto">
            <button onclick="submitFees()" id="syncBtn" class="w-full bg-gradient-to-r from-[#D4AF37] via-[#F5E6D3] to-[#B89328] text-black font-black rounded-2xl py-5 text-[11px] uppercase tracking-[0.2em] shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-all active:scale-[0.98]">
                Synchronize Cloud Ledger
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhMqGlvOjcYsMVD20whdfoXhrlH4ukCUqumBO4tcwi6d9-I4o88H3jtcoFWVbHOdYEYg/exec"; 
        let students = [];

        window.onload = async () => {
            document.getElementById('feeMonth').value = new Date().toISOString().slice(0, 7);
            try {
                const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
                const d = await r.json();
                const s = document.getElementById('batchSelect');
                d.batches.forEach(b => s.innerHTML += `<option value="${b.name}">${b.name}</option>`);
            } catch (e) { console.error("Batch load failed", e); }
        };

        async function loadStudents() {
            const b = document.getElementById('batchSelect').value;
            if(!b) return;
            document.getElementById('roster').innerHTML = `<tr><td colspan="6" class="p-32 text-center animate-pulse text-[#D4AF37]">FETCHING SQUAD DATA...</td></tr>`;
            const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}`);
            const d = await r.json();
            students = (d.students || []).map(s => ({...s, remindCount: 0}));
            render();
        }

        function render() {
            const tbody = document.getElementById('roster');
            tbody.innerHTML = '';
            students.forEach((s, i) => {
                const fee = parseFloat(s.fees) || 0;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.03]">
                        <td class="p-6">
                            <div class="font-bold text-white text-base tracking-tight">${s.name}</div>
                            <div class="text-[10px] text-[#D4AF37] font-black opacity-80 mt-1">ID: CFC-${1000 + i} • ${s.contact}</div>
                        </td>
                        <td class="p-6 space-y-2">
                            <div class="flex gap-2">
                                <select id="type-${i}" class="input-gold text-[10px] p-2 flex-1 font-bold"><option>UPI</option><option>CASH</option></select>
                                <button onclick="showQR(${fee})" class="bg-[#D4AF37] text-black rounded-lg px-3 text-[9px] font-black uppercase hover:bg-white transition-colors">QR</button>
                            </div>
                            <input id="pst-${i}" type="text" placeholder="Paid To (Coach/Admin)" class="input-gold text-[10px] p-2 w-full font-bold">
                        </td>
                        <td class="p-6 font-bold text-white/30 text-base">₹${fee}</td>
                        <td class="p-6">
                            <div class="relative group">
                                <input type="number" id="paid-${i}" value="0" oninput="calc(${i}, ${fee})" 
                                    class="input-gold w-28 p-3 font-black text-emerald-400 text-center text-lg">
                            </div>
                        </td>
                        <td class="p-6">
                            <div id="pend-${i}" class="font-black text-rose-500 text-lg">₹${fee}</div>
                            <span id="stat-${i}" class="status-badge pending">Pending</span>
                        </td>
                        <td class="p-6">
                            <div id="action-container-${i}" class="flex flex-col gap-2 min-w-[120px]">
                                <button onclick="sendWA(${i}, 'received')" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-xl py-3 text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all">Confirm Receipt</button>
                                <button id="remind-btn-${i}" onclick="sendWA(${i}, 'remind')" class="bg-white/5 text-white/60 border border-white/10 rounded-xl py-3 text-[10px] font-black uppercase transition-all">Send Reminder</button>
                            </div>
                            <div id="last-remind-${i}" class="text-[9px] text-white/20 italic mt-2 text-center font-bold"></div>
                        </td>
                    </tr>`;
            });
        }

        function showQR(amount) { 
            document.getElementById('qrPriceDisplay').innerText = `₹${amount}`;
            document.getElementById('qrModal').style.display = 'flex'; 
        }

        function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

        function calc(i, total) {
            const paidInput = document.getElementById(`paid-${i}`);
            const paid = parseFloat(paidInput.value) || 0;
            const pend = total - paid;
            
            document.getElementById(`pend-${i}`).innerText = `₹${pend}`;
            const s = document.getElementById(`stat-${i}`);
            const actionContainer = document.getElementById(`action-container-${i}`);

            if (pend <= 0) {
                s.innerText = "Fully Paid";
                s.className = `status-badge paid`;
                // Logic: Remove actions and show verified status
                actionContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-2 bg-emerald-500/10 rounded-2xl border border-emerald-500/20 animate-in fade-in">
                        <span class="text-emerald-500 text-[10px] font-black uppercase">✅ Verified</span>
                    </div>`;
            } else {
                s.innerText = "Pending";
                s.className = `status-badge pending`;
                // Restore buttons if amount is changed back
                if (!document.getElementById(`remind-btn-${i}`)) {
                    actionContainer.innerHTML = `
                        <button onclick="sendWA(${i}, 'received')" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-xl py-3 text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all">Confirm Receipt</button>
                        <button id="remind-btn-${i}" onclick="sendWA(${i}, 'remind')" class="bg-white/5 text-white/60 border border-white/10 rounded-xl py-3 text-[10px] font-black uppercase transition-all">Send Reminder</button>
                    `;
                }
            }
        }

        function sendWA(i, type) {
            const s = students[i];
            const paid = document.getElementById(`paid-${i}`).value || 0;
            const pend = document.getElementById(`pend-${i}`).innerText;
            const rawMonth = document.getElementById('feeMonth').value;
            const dateObj = new Date(rawMonth + "-01");
            const monthName = dateObj.toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            
            let text = "";

            if (type === 'remind') {
                s.remindCount = (s.remindCount || 0) + 1;
                const btn = document.getElementById(`remind-btn-${i}`);
                const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                
                // Color levels and messages
                if (s.remindCount === 1) {
                    btn.className = "remind-1 rounded-xl py-3 text-[10px] font-black uppercase transition-all";
                    text = `⚽ *CFC PAYMENT NOTICE* ⚽\n\nHi ${s.name}, this is a gentle reminder regarding the training fees for ${monthName}. \n\n*Amount Due:* ₹${s.fees}\n*Pending:* ${pend}\n\nYou can pay here: https://upi.pe/8867742269@ptaxis \n\nThank you for being part of Coffeeland FC!`;
                } else if (s.remindCount === 2) {
                    btn.className = "remind-2 rounded-xl py-3 text-[10px] font-black uppercase transition-all";
                    text = `⚽ *CFC SECOND REMINDER* ⚽\n\nHi ${s.name}, we haven't received the fees for ${monthName} yet. Requesting you to clear the balance of ${pend} at your earliest convenience to help us maintain smooth club operations.\n\nPay via UPI: 8867742269@ptaxis\n\nRegards, Team CFC.`;
                } else {
                    btn.className = "remind-3 rounded-xl py-3 text-[10px] font-black uppercase transition-all";
                    text = `⚽ *CFC URGENT REMINDER* ⚽\n\nHi ${s.name}, our records show that fees for ${monthName} are still outstanding. We would appreciate it if you could settle the balance of ${pend} today.\n\nUPI: 8867742269@ptaxis\n\nIf already paid, please ignore this or send the screenshot.`;
                }
                
                s.lastReminded = now;
                document.getElementById(`last-remind-${i}`).innerText = `Last sent at ${now} (x${s.remindCount})`;
            } else {
                text = `✅ *CFC FEE RECEIPT* ✅\n\nHi ${s.name},\n\nWe have successfully received ₹${paid} towards fees for ${monthName}.\n\n*Current Balance:* ${pend}\n\nThank you for your prompt payment! Keep training hard! ⚽`;
            }
            
            window.open(`https://wa.me/${s.contact}?text=${encodeURIComponent(text)}`);
        }

        async function submitFees() {
            const btn = document.getElementById('syncBtn');
            const rawMonth = document.getElementById('feeMonth').value;
            const dateObj = new Date(rawMonth + "-01");
            const monthName = dateObj.toLocaleString('en-IN', { month: 'long', year: 'numeric' });

            const logs = students.map((s, i) => {
                const typeEl = document.getElementById(`type-${i}`);
                const pstEl = document.getElementById(`pst-${i}`);
                const paidEl = document.getElementById(`paid-${i}`);
                const pendEl = document.getElementById(`pend-${i}`);
                const statEl = document.getElementById(`stat-${i}`);

                return {
                    name: s.name, 
                    contact: s.contact, 
                    batch: s.batch, 
                    fees: s.fees,
                    feeType: typeEl ? typeEl.value : "N/A",
                    paidTo: pstEl ? pstEl.value : "N/A",
                    paidAmount: paidEl ? (paidEl.value || 0) : 0,
                    pending: pendEl ? pendEl.innerText.replace('₹', '') : s.fees,
                    status: statEl ? statEl.innerText : "Pending",
                    lastReminded: s.lastReminded || ""
                };
            }).filter(r => parseFloat(r.paidAmount) > 0 || r.lastReminded !== "");

            if(!logs.length) return alert("No new transactions or reminders to sync.");
            
            btn.innerText = "UPDATING CLOUD DATABASE..."; btn.disabled = true;

            const fd = new URLSearchParams();
            fd.append('payload', JSON.stringify({ action: 'sync', month: monthName, data: logs }));
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
                alert("Success! Cloud Ledger Synchronized.");
                loadStudents();
            } catch(e) { 
                alert("Sync Error: " + e.message); 
            } finally { 
                btn.innerText = "Synchronize Cloud Ledger"; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
</html>

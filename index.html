<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFC Fees Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        coffee: {
                            900: '#150E0A',
                            800: '#1E140F',
                            700: '#2C1D16',
                            accent: '#D4AF37',
                            light: '#F5E6D3'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #150E0A;
            color: #F5E6D3;
            background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: linear-gradient(145deg, rgba(30, 20, 15, 0.9) 0%, rgba(44, 29, 22, 0.6) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .btn-premium {
            background: linear-gradient(135deg, #D4AF37 0%, #B89328 100%);
            color: #150E0A;
            transition: all 0.3s ease;
        }
        /* Status Toggle Styles */
        .status-toggle input:checked + .status-track { background-color: rgba(16, 185, 129, 0.2); border-color: #10B981; }
        .status-toggle input:checked + .status-track .status-thumb { transform: translateX(24px); background-color: #10B981; }
        .status-track {
            width: 48px; height: 24px; background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 99px; position: relative; cursor: pointer;
        }
        .status-thumb {
            width: 18px; height: 18px; background-color: #EF4444; border-radius: 50%;
            position: absolute; left: 3px; top: 2px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="max-w-md mx-auto px-4 pt-8 space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-white tracking-tight">Fee Collection</h1>
            <p class="text-coffee-accent text-sm font-medium uppercase tracking-widest mt-1">Finance Portal</p>
        </header>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass-panel p-4 rounded-2xl text-center">
                <p class="text-[10px] uppercase text-coffee-light/50 font-bold mb-1">Total Expected</p>
                <p class="text-xl font-bold text-white" id="totalExpected">₹0</p>
            </div>
            <div class="glass-panel p-4 rounded-2xl text-center border-l-2 border-l-coffee-accent">
                <p class="text-[10px] uppercase text-coffee-light/50 font-bold mb-1">Collected</p>
                <p class="text-xl font-bold text-coffee-accent" id="totalCollected">₹0</p>
            </div>
        </div>

        <div class="glass-panel p-5 rounded-2xl space-y-4">
            <div>
                <label class="text-[10px] font-bold text-coffee-accent uppercase tracking-wider">Select Batch</label>
                <select id="batchFilter" onchange="filterRoster()" class="w-full bg-coffee-900/50 border border-coffee-accent/20 rounded-xl p-3 mt-1 text-white focus:outline-none focus:border-coffee-accent">
                    <option value="All">All Batches</option>
                    <option value="Xavier's School">Xavier's School</option>
                    <option value="District Field">District Field</option>
                </select>
            </div>
            <div class="flex gap-2">
                <input type="month" id="feeMonth" class="flex-1 bg-coffee-900/50 border border-coffee-accent/20 rounded-xl p-3 text-white text-sm">
                <button onclick="loadStudentData()" class="btn-premium px-5 rounded-xl font-bold text-sm">Sync</button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="inline-block w-8 h-8 border-4 border-coffee-accent/20 border-t-coffee-accent rounded-full animate-spin"></div>
            <p class="text-xs mt-2 text-coffee-light/40 italic">Accessing Ledger...</p>
        </div>

        <div id="studentList" class="space-y-3">
            </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-coffee-900/80 backdrop-blur-md border-t border-coffee-accent/20 z-50">
            <button onclick="saveFees()" id="saveBtn" class="btn-premium w-full max-w-md mx-auto py-4 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
                <span>Update Sheet</span>
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUiEuhGkvGwibifwF-ANnft0gNAD0sDfXX8j75WxV3o3Lwu6p1UWF3HFSIulpBC5xh2Q/exec"; // Replace with your deployed URL
        let allStudents = [];

        document.getElementById('feeMonth').value = new Date().toISOString().slice(0, 7);

        async function loadStudentData() {
            const list = document.getElementById('studentList');
            const loader = document.getElementById('loading');
            
            list.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                // We fetch from the 'Students' sheet as requested
                const response = await fetch(`${WEB_APP_URL}?action=getStudents`);
                const data = await response.json();
                allStudents = data.students;
                filterRoster();
            } catch (err) {
                alert("Connection failed. Check Script URL.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function filterRoster() {
            const batch = document.getElementById('batchFilter').value;
            const container = document.getElementById('studentList');
            container.innerHTML = '';
            
            let expected = 0;
            let collected = 0;

            const filtered = allStudents.filter(s => batch === 'All' || s.batch === batch);

            filtered.forEach((s, idx) => {
                const feeAmount = parseInt(s.fees.replace(/[^\d]/g, '')) || 0;
                expected += feeAmount;
                if(s.status === 'Paid') collected += feeAmount;

                container.innerHTML += `
                    <div class="glass-panel p-4 rounded-2xl flex items-center justify-between border-l-4 ${s.status === 'Paid' ? 'border-l-green-500' : 'border-l-red-500'} transition-all">
                        <div class="flex-1">
                            <h4 class="font-bold text-white text-base">${s.name}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] px-2 py-0.5 bg-coffee-accent/10 text-coffee-accent rounded-md border border-coffee-accent/20">${s.batch}</span>
                                <span class="text-sm font-semibold text-coffee-light/80">₹${feeAmount}</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <a href="https://wa.me/${s.contact}?text=Hi ${s.name}, this is a reminder for your CFC fees for ${document.getElementById('feeMonth').value}." class="p-2 bg-green-500/10 rounded-full border border-green-500/20 text-green-500">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.012 2c-5.508 0-9.987 4.479-9.987 9.988 0 1.757.459 3.404 1.258 4.838l-1.341 4.903 5.034-1.321c1.408.767 3.013 1.207 4.72 1.207 5.508 0 9.988-4.479 9.988-9.988 0-5.509-4.48-9.988-9.988-9.988zm4.847 14.125c-.215.604-1.231 1.154-1.688 1.21-.456.056-.897.272-2.923-.526-2.438-.962-4.004-3.438-4.125-3.601-.121-.162-1.021-1.356-1.021-2.585 0-1.23.645-1.834.872-2.087.227-.254.495-.317.659-.317.164 0 .328.001.47.009.15.007.351-.057.549.421.199.479.68 1.659.739 1.779.059.121.099.261.019.421-.079.16-.12.261-.24.4-.12.14-.251.312-.359.419-.12.12-.244.251-.106.489.138.238.613 1.011 1.315 1.636.903.805 1.666 1.053 1.904 1.173.238.12.378.1.517-.059.14-.16.598-.696.758-.935.16-.24.32-.201.539-.12.22.08 1.396.658 1.636.777.24.12.399.18.459.28.06.1.06.579-.155 1.183z"/></svg>
                            </a>
                            <label class="status-toggle">
                                <input type="checkbox" class="hidden" ${s.status === 'Active' || s.status === 'Paid' ? 'checked' : ''} onchange="updateRowColor(this)">
                                <div class="status-track"><div class="status-thumb"></div></div>
                            </label>
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalExpected').innerText = `₹${expected}`;
            document.getElementById('totalCollected').innerText = `₹${collected}`;
        }

        function updateRowColor(cb) {
            const row = cb.closest('.glass-panel');
            if(cb.checked) {
                row.classList.remove('border-l-red-500');
                row.classList.add('border-l-green-500');
            } else {
                row.classList.remove('border-l-green-500');
                row.classList.add('border-l-red-500');
            }
        }

        async function saveFees() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = 'Syncing...';

            // Logic to collect all checkbox states and send to "Fees" sheet
            setTimeout(() => {
                alert("Success: Ledger Updated for " + document.getElementById('feeMonth').value);
                btn.disabled = false;
                btn.innerHTML = 'Update Sheet';
            }, 1500);
        }

        // Auto-load on start
        window.onload = loadStudentData;
    </script>
</body>
</html>

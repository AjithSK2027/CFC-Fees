<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC Fees | Card-based History</title>

    <link rel="apple-touch-icon" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { mint: '#10B981', rose: '#F43F5E', gold: '#EAB308' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-body: #F6F8FB; --bg-header: rgba(246,248,251,0.82);
            --bg-card: rgba(255,255,255,0.96); --bg-card-solid: #FFFFFF;
            --text-main: #111827; --border: rgba(17,24,39,0.08);
            --card-shadow: 0 8px 30px -12px rgba(17,24,39,0.2);
            --loader-bg: #F6F8FB; --loader-text: #111827;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #050505; --bg-header: rgba(5,5,5,0.68);
                --bg-card: rgba(20,20,20,0.96); --bg-card-solid: #0F0A08;
                --text-main: #E5E7EB; --border: rgba(255,255,255,0.06);
                --loader-bg: #050505; --loader-text: #FFFFFF;
            }
        }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .main-fader { width: 100%; height: 100vh; position: fixed; top:0; left:0; background: var(--loader-bg); z-index:10000; display:flex; align-items:center; justify-content:center; transition: opacity 0.6s ease; }
        .main-fader.hidden { opacity:0; visibility:hidden; }
        .loader svg { height: 100px; margin:0 auto; }
        .loader svg path { animation: pulse-svg 1.2s infinite ease-in-out; fill:#10B981; }
        @keyframes pulse-svg { 0%,100%{opacity:0.1;transform:scale(0.96);} 50%{opacity:1;transform:scale(1);} }
        
        header { background: var(--bg-header); backdrop-filter: blur(14px); padding-top: calc(env(safe-area-inset-top) + 0.8rem); padding-bottom: 0.8rem; }
        .card-gradient { background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--card-shadow); border-radius: 1.5rem; }
        .hidden-view { display: none !important; }
        #qrModal { display: none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(12px); }
        
        .input-dark { background: var(--bg-card-solid); border: 1px solid var(--border); color: var(--text-main); border-radius: 1rem; transition: all 0.2s ease; }
        .input-dark:focus { outline: none; border-color: #10B981; }
        
        .filter-chip { border: 1px solid var(--border); background: rgba(0,0,0,0.04); transition: all 0.2s; cursor: pointer; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 800; }
        .filter-chip.active { background: #10B981; color: white; border-color: transparent; }
        .month-chip { cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 700; text-align: center; }
        .month-chip.selected { background: #10B981; color: white; border-color: transparent; }
        .search-shell { background: linear-gradient(180deg, rgba(16,185,129,0.08), rgba(255,255,255,0.02)); border: 1px solid var(--border); border-radius: 1.5rem; }
        
        .card-pending { border-top: 5px solid #F43F5E; }
        .card-partial { border-top: 5px solid #EAB308; }
        .card-paid { border-top: 5px solid #10B981; }
        
        button, .month-chip, .filter-chip { cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.97); transition: transform 0.05s; }
        .whatsapp-icon { width: 20px; height: 20px; display: inline-block; vertical-align: middle; }
        .student-id { font-family: monospace; font-size: 9px; background: rgba(0,0,0,0.05); display: inline-block; padding: 2px 6px; border-radius: 20px; }
        .fee-label { font-size: 11px; font-weight: 700; color: #6B7280; letter-spacing: 0.3px; }
        .fee-amount { font-size: 18px; font-weight: 800; line-height: 1.2; }
        
        .tab { display: inline-block; padding: 8px 16px; font-weight: 800; font-size: 12px; border-radius: 30px; cursor: pointer; background: rgba(0,0,0,0.05); margin-right: 8px; }
        .tab.active { background: #10B981; color: white; }
        
        .history-card { padding: 12px; margin-bottom: 12px; border-radius: 1rem; background: var(--bg-card); border: 1px solid var(--border); }
        .history-grid { display: flex; flex-direction: column; gap: 12px; }
        .history-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .history-label { font-size: 11px; font-weight: 700; color: #6B7280; }
        .history-value { font-size: 14px; font-weight: 800; }
    </style>
</head>

39,8.1a9.29,9.29,0,0,0,3.13.83c5.45.69,10.89,1.38,16.35,1.94a10.41,10.41,0,0,0,3.07-.71c-11.48-9.9-24.26-14.61-38.71-14.56Z"/><path class="path-7" d="M66.28,132.51c13.36,3.78,25.62,3.5,38-.9C91.68,129.59,79.36,128,66.28,132.51Z"/><path class="path-8" d="M127.2,30.66l-1.27.37a18.58,18.58,0,0,0,1,3.08c3,5.52,6.21,10.89,8.89,16.54,1.34,2.83,3.41,3.82,6.49,4.9a60.38,60.38,0,0,0-15.12-24.9Z"/></svg>

</div>

<header class="px-5 flex justify-between items-center sticky top-0 z-40">
    <div onclick="location.reload()" class="cursor-pointer">
        <h1 class="text-lg font-black uppercase leading-none">CFC <span class="text-emerald-500">Fees</span></h1>
        <p class="text-gray-500 text-[8px] font-bold tracking-widest uppercase mt-0.5">Command Center</p>

    <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-8 w-8 rounded-full">

<!-- LOBBY -->
<div id="lobbyView" class="px-5 transition-all duration-300 space-y-4 mt-5">
    <div><select id="homeBatchSelect" onchange="selectBatch(this.value)" class="input-dark p-3 text-xs font-bold w-full rounded-xl"><option value="">Quick Jump...</option></select></div>
    <div class="search-shell rounded-xl p-3"><div class="flex gap-2 items-center"><div class="text-base">🔎</div><input id="homePlayerSearch" type="text" placeholder="Search player from any batch..." oninput="searchHomePlayers()" class="bg-transparent w-full outline-none text-sm font-bold"></div></div>
    <div id="homeSearchResults" class="space-y-2"></div>

<!-- COMMAND VIEW -->
<div id="commandView" class="hidden-view px-5 space-y-5 mt-5">
    <div class="flex">
        <div id="tab-fees" class="tab active" onclick="switchTab('fees')">💰 Fees Collection</div>
        <div id="tab-history" class="tab" onclick="switchTab('history')">📜 Payment History</div>
    </div>

    <!-- Fees Tab -->
    <div id="feesView">
        <div class="card-gradient p-4 grid grid-cols-3 gap-2 text-center rounded-xl">
            <div><p class="text-[7px] font-bold text-gray-500 uppercase">Target</p><p id="dashTarget" class="text-sm font-black">₹0</p></div>
            <div class="border-x border-black/5"><p class="text-[7px] font-bold text-gray-500 uppercase">Received</p><p id="dashPaid" class="text-sm font-black text-mint">₹0</p></div>
            <div><p class="text-[7px] font-bold text-gray-500 uppercase">Pending</p><p id="dashPending" class="text-sm font-black text-rose">₹0</p></div>
        </div>

        <div class="flex gap-2 mt-3">
            <select id="batchSelect" class="input-dark p-3 text-xs font-bold rounded-xl flex-1"></select>
            <input type="date" id="feeDate" class="input-dark p-3 text-xs font-bold rounded-xl w-1/3">
        </div>

        <div class="search-shell rounded-xl p-3 mt-3"><div class="flex gap-2 items-center"><div class="text-base">🔎</div><input id="studentSearch" type="text" placeholder="Search in batch..." oninput="applyFilters()" class="bg-transparent w-full outline-none text-sm font-bold"></div></div>

        <div class="flex flex-wrap items-center justify-between gap-2 mt-3">
            <div class="flex flex-wrap gap-1.5">
                <button id="filter-all" onclick="setStatusFilter('all')" class="filter-chip active">All</button>
                <button id="filter-pending" onclick="setStatusFilter('pending')" class="filter-chip">Pending</button>
                <button id="filter-partial" onclick="setStatusFilter('partial')" class="filter-chip">Partial</button>
                <button id="filter-paid" onclick="setStatusFilter('paid')" class="filter-chip">Paid</button>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="text-[7px] text-gray-400">📅</span>
                <select id="viewMonthFilter" onchange="loadStudents()" class="input-dark px-2 py-1.5 text-[9px] font-bold rounded-lg"></select>
            </div>
        </div>
        <p id="searchMeta" class="text-[9px] font-bold text-mint text-right -mt-2">0 shown</p>

        <main id="roster" class="space-y-4 pb-24 mt-3"></main>
    </div>

    <!-- History Tab (card-based) -->

        <div class="search-shell rounded-xl p-3"><div class="flex gap-2 items-center"><div class="text-base">🔎</div><input id="historySearch" type="text" placeholder="Search by student name, batch, month..." oninput="filterHistory()" class="bg-transparent w-full outline-none text-sm font-bold"></div></div>
        <div id="historyCardContainer" class="history-grid"></div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZOLNsu8DgwEAcum0XFls9Aw-rjddabQS-5G0Meb9_-IYP8cnLXmdie2ZeGN2fgvxXLQ/exec";
let students = [];
let currentStatusFilter = 'all';
let homeSearchTimer = null;
let allPayments = [];

function hideLoader() { document.querySelector('.main-fader')?.classList.add('hidden'); }

window.onload = async () => {
    document.getElementById('feeDate').value = new Date().toISOString().split('T')[0];
    populateViewMonthFilter();
    try {
        const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
        const d = await r.json();
        const grid = document.getElementById('batchGrid');
        const hSelect = document.getElementById('homeBatchSelect');
        const bSelect = document.getElementById('batchSelect');
        if (d.batches) {
            d.batches.forEach(b => {
                const opt = `<option value="${b.name}">${b.name}</option>`;
                hSelect.innerHTML += opt; bSelect.innerHTML += opt;
                grid.innerHTML += `<button onclick="selectBatch('${b.name}')" class="card-gradient p-4 flex flex-col justify-between aspect-square text-left active:scale-95 transition-all rounded-xl"><div class="text-lg">⚽</div><div><h3 class="text-xs font-extrabold uppercase">${b.name}</h3><p class="text-[7px] text-mint font-black uppercase tracking-wider">Enter Hub</p></div></button>`;
            });
        }
        setTimeout(hideLoader, 800);
    } catch(e) { alert("Unable to load hubs"); hideLoader(); }
};

function selectBatch(batchName) {
    document.getElementById('batchSelect').value = batchName;
    document.getElementById('lobbyView').classList.add('hidden-view');
    document.getElementById('commandView').classList.remove('hidden-view');
    loadStudents();
}

function switchTab(tab) {
    document.getElementById('feesView').classList.add('hidden-view');
    document.getElementById('historyView').classList.add('hidden-view');
    document.getElementById('tab-fees').classList.remove('active');
    document.getElementById('tab-history').classList.remove('active');
    if (tab === 'fees') {
        document.getElementById('feesView').classList.remove('hidden-view');
        document.getElementById('tab-fees').classList.add('active');
    } else {
        document.getElementById('historyView').classList.remove('hidden-view');
        document.getElementById('tab-history').classList.add('active');
        loadAllPayments();
    }
}

async function loadAllPayments() {
    const container = document.getElementById('historyCardContainer');
    container.innerHTML = '<div class="text-center py-8 text-gray-500">Loading payments...</div>';
    try {
        const r = await fetch(`${SCRIPT_URL}?action=getAllPayments`);
        const data = await r.json();
        allPayments = data.payments || [];
        renderHistoryCards();
    } catch(e) { console.error(e); container.innerHTML = '<div class="text-center py-8 text-red-500">Failed to load payments</div>'; }
}

function renderHistoryCards() {
    const searchTerm = document.getElementById('historySearch')?.value.toLowerCase() || '';
    const filtered = allPayments.filter(p => 
        (p.studentName?.toLowerCase().includes(searchTerm) ||
         p.studentBatch?.toLowerCase().includes(searchTerm) ||
         p.month?.toLowerCase().includes(searchTerm) ||
         p.date?.includes(searchTerm))
    );
    const container = document.getElementById('historyCardContainer');
    if (filtered.length === 0) { container.innerHTML = '<div class="text-center py-8 text-gray-500">No payments found</div>'; return; }
    let html = '';
    filtered.forEach(p => {
        html += `
            <div class="history-card">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <h3 class="font-extrabold text-base">${escapeHtml(p.studentName || '')}</h3>
                        <p class="text-[10px] text-gray-500">${escapeHtml(p.studentBatch || '')}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editPayment('${p.uuid}', '${p.month}', ${p.amount}, '${p.date || ''}', '${escapeHtml(p.note || '')}')" class="text-blue-500 text-sm px-2 py-1 bg-blue-50 rounded-lg">✏️ Edit</button>
                        <button onclick="deletePayment('${p.uuid}')" class="text-red-500 text-sm px-2 py-1 bg-red-50 rounded-lg">🗑️ Delete</button>
                    </div>
                </div>
                <div class="history-row"><span class="history-label">📅 Date</span><span class="history-value">${p.date || '-'}</span></div>
                <div class="history-row"><span class="history-label">📆 Month</span><span class="history-value">${p.month || '-'}</span></div>
                <div class="history-row"><span class="history-label">💰 Amount</span><span class="history-value text-mint">₹${p.amount || 0}</span></div>
                <div class="history-row"><span class="history-label">💳 Type</span><span class="history-value">${p.feeType || '-'}</span></div>
                <div class="history-row"><span class="history-label">👤 Paid To</span><span class="history-value">${escapeHtml(p.paidTo || '-')}</span></div>
                <div class="history-row"><span class="history-label">📝 Note</span><span class="history-value text-gray-500">${escapeHtml(p.note || '-')}</span></div>
            </div>
        `;
    });
    container.innerHTML = html;
}

function filterHistory() { renderHistoryCards(); }

async function deletePayment(uuid) {
    if (!confirm("Delete this payment? Cannot undo.")) return;
    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ payload: JSON.stringify({ action: 'deletePayment', uuid: uuid }) }) });
        const out = await r.json();
        if (out.status === 'success') {
            alert("Deleted.");
            if (document.getElementById('historyView').classList.contains('hidden-view') === false) loadAllPayments();
            if (document.getElementById('feesView').classList.contains('hidden-view') === false) loadStudents();
        } else throw new Error();
    } catch(e) { alert("Delete failed"); }
}

function editPayment(uuid, currentMonth, currentAmount, currentDate, currentNote) {
    const newAmount = prompt("Enter new amount:", currentAmount);
    if (newAmount === null) return;
    const newMonth = prompt("Enter new month (YYYY-MM):", currentMonth);
    if (newMonth === null) return;
    const newNote = prompt("Enter new note:", currentNote);
    const payload = { action: 'updatePayment', uuid: uuid, updated: { amount: parseFloat(newAmount), month: newMonth, paymentDate: currentDate, note: newNote || '' } };
    fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ payload: JSON.stringify(payload) }) })
        .then(r => r.json()).then(out => { if (out.status === 'success') { alert("Updated."); if (document.getElementById('historyView').classList.contains('hidden-view') === false) loadAllPayments(); if (document.getElementById('feesView').classList.contains('hidden-view') === false) loadStudents(); } else alert("Update failed"); })
        .catch(() => alert("Update failed"));
}

// ========== FEES COLLECTION FUNCTIONS (unchanged from your original working code) ==========
function populateViewMonthFilter() {
    let months = [], today = new Date();
    for (let i = 0; i <= 3; i++) {
        let d = new Date(today.getFullYear(), today.getMonth() - i, 1);
        let yyyy = d.getFullYear(), mm = String(d.getMonth() + 1).padStart(2,'0');
        months.push(`${yyyy}-${mm}`);
    }
    let select = document.getElementById('viewMonthFilter');
    select.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
    select.value = months[0];
}

async function loadStudents() {
    const b = document.getElementById('batchSelect').value, viewMonth = document.getElementById('viewMonthFilter').value;
    if (!b) return;
    document.getElementById('roster').innerHTML = '<p class="py-16 text-center text-mint font-bold animate-pulse text-[9px]">Loading...</p>';
    try {
        const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}&date=${viewMonth}-01`);
        const data = await r.json();
        students = (data.students || []).map(s => {
            s.fees = Number(s.fees); s.paidSoFar = Number(s.paidSoFar); s.balance = Number(s.balance); s.remindCount = Number(s.remindCount) || 0; s.studentId = s.studentId || 'N/A';
            return s;
        });
        updateDashboard(); render();
    } catch(e) { alert("Failed to load students"); document.getElementById('roster').innerHTML = '<p class="py-16 text-center text-rose text-xs">Error loading data</p>'; }
}

function updateDashboard() {
    let t = 0, p = 0, b = 0; students.forEach(s => { t += s.fees; p += s.paidSoFar; b += s.balance; });
    document.getElementById('dashTarget').innerText = `₹${t}`; document.getElementById('dashPaid').innerText = `₹${p}`; document.getElementById('dashPending').innerText = `₹${b}`;
}

function getStatusForStudent(s) { if (s.balance === 0) return 'paid'; if (s.balance === s.fees) return 'pending'; return 'partial'; }

function generateMonthChips(i) {
    const months = ["MAY", "APR", "MAR", "FEB"];
    let html = '';
    for (let j = 0; j <= 3; j++) html += `<div onclick="toggleMonth(${i}, ${j})" id="mchip-${i}-${j}" class="month-chip ${j === 0 ? 'selected' : ''}">${months[j]}</div>`;
    return html;
}
function toggleMonth(i, j) { document.getElementById(`mchip-${i}-${j}`).classList.toggle('selected'); calcBalance(i); }
function calcBalance(i) {
    const s = students[i];
    const monthsCount = document.querySelectorAll(`[id^="mchip-${i}-"].selected`).length;
    const paidInput = parseFloat(document.getElementById(`paid-${i}`).value || 0);
    const newPend = Math.max(0, (s.fees * monthsCount) - (s.paidSoFar + paidInput));
    document.getElementById(`pend-${i}`).innerText = `₹${newPend}`;
}
function getSelectedMonthStrings(i) {
    const selectedChips = document.querySelectorAll(`[id^="mchip-${i}-"].selected`);
    const curDate = new Date();
    const months = [];
    selectedChips.forEach(chip => {
        const j = parseInt(chip.id.split('-').pop());
        let mIdx = curDate.getMonth() - j;
        if (mIdx < 0) mIdx += 12;
        let year = curDate.getFullYear(), month = mIdx + 1;
        if (mIdx > curDate.getMonth()) year--;
        months.push(`${year}-${String(month).padStart(2, '0')}`);
    });
    return months;
}
async function liveSettle(i) {
    const s = students[i], btn = document.getElementById(`settle-btn-${i}`);
    const amt = parseFloat(document.getElementById(`paid-${i}`).value || 0);
    const selectedMonths = getSelectedMonthStrings(i);
    const monthsCount = selectedMonths.length;
    if (amt <= 0) return alert("Enter amount");
    if (monthsCount === 0) return alert("Select at least one month");
    btn.innerText = "SAVING..."; btn.disabled = true;
    const splitAmount = Math.floor(amt / monthsCount), remainder = amt - (splitAmount * monthsCount);
    const records = selectedMonths.map((month, idx) => ({
        studentId: s.studentId, name: s.name, contact: s.contact, batch: s.batch, fees: s.fees,
        paidAmount: idx === 0 ? splitAmount + remainder : splitAmount,
        balance: Math.max(0, s.fees - (idx === 0 ? splitAmount + remainder : splitAmount)),
        feeType: document.getElementById(`type-${i}`).value, paidTo: document.getElementById(`pst-${i}`).value,
        note: document.getElementById(`note-${i}`).value, targetMonth: month, paymentDate: document.getElementById('feeDate').value
    }));
    try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ payload: JSON.stringify({ action: 'saveFees', date: document.getElementById('feeDate').value, data: records }) }) });
        const out = await response.json();
        if (out.status === 'success') {
            s.tempPaid = true; s.lastPaidAmt = amt; s.lastMonthsCount = monthsCount; s.paidSoFar += amt; s.balance = Math.max(0, s.balance - amt); s.note = records[0].note;
            updateDashboard(); render();
        } else throw new Error();
    } catch(e) { alert("Sync Failed"); btn.innerText = "SETTLE"; btn.disabled = false; }
}
async function liveRemind(i) {
    const s = students[i], btn = document.getElementById(`rem-btn-${i}`);
    btn.innerText = "LOGGING...";
    const newCount = (Number(s.remindCount) || 0) + 1;
    const record = { studentId: s.studentId, name: s.name, batch: s.batch, newRemindSent: true, remindCount: newCount, paidAmount: 0, paymentDate: document.getElementById('feeDate').value };
    try { await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ payload: JSON.stringify({ action: 'saveFees', date: document.getElementById('feeDate').value, data: [record] }) }) }); s.remindCount = newCount; render(); sendWA(i, 'remind'); } 
    catch(e) { s.remindCount = newCount; render(); sendWA(i, 'remind'); }
}
function sendWA(i, type) {
    const s = students[i]; let ph = String(s.contact || '').replace(/\D/g, ''); if (!ph.startsWith('91')) ph = '91' + ph;
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const curDate = new Date(); const paidAmount = document.getElementById(`paid-${i}`)?.value || (s.lastPaidAmt || "0");
    const selectedMonths = getSelectedMonthStrings(i);
    let monthLabel = "";
    if (selectedMonths.length > 0) {
        const labels = selectedMonths.map(m => { const d = new Date(m + "-01"); return monthNames[d.getMonth()]; });
        monthLabel = labels.join(", ");
    } else { monthLabel = monthNames[curDate.getMonth()]; }
    let msg = type === 'receipt' ? `✅ Payment Successful\n\n${s.name}\nAmount: ₹${paidAmount}\nMonths: ${monthLabel}\nBalance: ₹${s.balance}\n\nThanks - Coffeeland FC` : `⚠️ Fee Reminder\n\n${s.name}\nDue: ₹${s.balance}\nMonth: ${monthLabel}\nUPI: 8867742269@ptaxis\n\nPlease pay at earliest - Coffeeland FC`;
    window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`);
}
function render() {
    const container = document.getElementById('roster');
    container.innerHTML = '';
    let counts = { all: students.length, pending: 0, partial: 0, paid: 0 };
    students.forEach(s => { let st = getStatusForStudent(s); counts[st]++; });
    document.getElementById('filter-pending').innerHTML = `Pending (${counts.pending})`;
    document.getElementById('filter-partial').innerHTML = `Partial (${counts.partial})`;
    document.getElementById('filter-paid').innerHTML = `Paid (${counts.paid})`;
    document.getElementById('filter-all').innerHTML = `All (${counts.all})`;

    students.forEach((s, i) => {
        const status = getStatusForStudent(s), isPaid = status === 'paid';
        const rCount = Number(s.remindCount || 0);
        let remindBtnColor = "bg-black/5 text-gray-500 border-black/10";
        if (rCount === 1) remindBtnColor = "bg-amber-500/20 text-amber-700 border-amber-500/30";
        if (rCount === 2) remindBtnColor = "bg-orange-500/20 text-orange-700 border-orange-500/30";
        if (rCount >= 3) remindBtnColor = "bg-red-500/20 text-red-700 border-red-500/30";
        let cardClass = status === 'paid' ? 'card-paid' : (status === 'partial' ? 'card-partial' : 'card-pending');
        let badgeClass = status === 'paid' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300' : (status === 'partial' ? 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300');
        const whatsappIcon = `<img src="https://i.ibb.co/60NPMpPd/Pngtree-whatsapp-icon-whatsapp-logo-whatsapp-3584845.png" class="whatsapp-icon" alt="WhatsApp">`;
        if (isPaid) {
            container.innerHTML += `<div class="student-card card-gradient p-4 space-y-3 rounded-xl ${cardClass}" data-name="${s.name.toLowerCase()}" data-status="paid"><div class="flex justify-between items-start"><div><h3 class="text-base font-extrabold">${escapeHtml(s.name)}</h3><div class="flex flex-wrap items-center gap-2 mt-0.5"><p class="text-[9px] text-gray-500 font-bold">${escapeHtml(s.contact)}</p><span class="student-id text-[8px]">ID: ${escapeHtml(s.studentId.substring(0,12))}</span></div></div><span class="px-2 py-1 rounded-lg text-[8px] font-black uppercase ${badgeClass}">PAID</span></div><div class="bg-mint/10 border border-mint/20 rounded-xl p-3 space-y-2"><div class="flex justify-between items-center"><p class="text-[8px] font-black text-mint uppercase tracking-wider">✓ PAID SUCCESSFULLY</p><button onclick="sendWA(${i}, 'receipt')" class="w-8 h-8 bg-mint/20 text-mint rounded-lg flex items-center justify-center">${whatsappIcon}</button></div><div class="space-y-1 pt-1 border-t border-mint/10"><p class="text-[8px] font-bold text-gray-600">Amount Paid: <span class="text-mint">₹${s.lastPaidAmt || s.paidSoFar}</span></p><p class="text-[8px] font-bold text-gray-600">Months Covered: <span class="text-mint">${s.lastMonthsCount || 'Current'}</span></p><p class="text-[8px] font-bold text-gray-600">Balance: <span class="${s.balance > 0 ? 'text-rose' : 'text-mint'}">₹${s.balance}</span></p>${s.note ? `<p class="text-[8px] italic text-gray-500 pt-1">📝 ${s.note}</p>` : ''}</div><p class="text-[7px] text-gray-400 text-right mt-1">📅 ${document.getElementById('feeDate').value}</p></div></div>`;
        } else {
            const monthChipsHtml = generateMonthChips(i);
            container.innerHTML += `<div class="student-card card-gradient p-4 space-y-3 rounded-xl ${cardClass}" data-name="${s.name.toLowerCase()}" data-status="${status}"><div class="flex justify-between items-start"><div><h3 class="text-base font-extrabold">${escapeHtml(s.name)}</h3><div class="flex flex-wrap items-center gap-2 mt-0.5"><p class="text-[9px] text-gray-500 font-bold">${escapeHtml(s.contact)}</p><span class="student-id text-[8px]">ID: ${escapeHtml(s.studentId.substring(0,12))}</span></div></div><span class="px-2 py-1 rounded-lg text-[8px] font-black uppercase ${badgeClass}">${status === 'partial' ? 'PARTIAL' : 'PENDING'}</span></div><div class="space-y-3 py-1"><div class="flex justify-between items-center border-b border-black/10 dark:border-white/10 pb-2"><span class="fee-label">📊 Monthly Fee</span><span class="fee-amount">₹${s.fees}</span></div><div class="flex justify-between items-center border-b border-black/10 dark:border-white/10 pb-2"><span class="fee-label">✅ Paid this month</span><span class="fee-amount text-mint">₹${s.paidSoFar}</span></div><div class="flex justify-between items-center"><span class="fee-label">⚠️ Remaining</span><span class="fee-amount text-rose" id="pend-${i}">₹${s.balance}</span></div></div><div class="space-y-2"><label class="text-[8px] font-black text-gray-400 uppercase tracking-wider">📆 SELECT MONTHS</label><div class="flex gap-2 flex-wrap">${monthChipsHtml}</div></div><div class="space-y-2"><label class="text-[8px] font-black text-gray-400 uppercase tracking-wider">💰 PAYMENT AMOUNT</label><input type="number" id="paid-${i}" placeholder="Enter amount" oninput="calcBalance(${i})" class="input-dark w-full p-2.5 text-base font-bold rounded-lg"></div><div class="grid grid-cols-2 gap-2"><select id="type-${i}" class="input-dark text-[9px] p-2.5 font-bold rounded-lg"><option>UPI</option><option>CASH</option></select><input id="pst-${i}" type="text" placeholder="Paid To" class="input-dark text-[9px] p-2.5 font-bold rounded-lg"></div><input id="note-${i}" type="text" placeholder="📝 Add note..." class="input-dark text-[9px] p-2.5 font-bold rounded-lg w-full"><div class="grid grid-cols-3 gap-2 pt-2"><button onclick="showQR(${i})" class="bg-black/5 px-2 py-2.5 rounded-lg text-[9px] font-bold border border-black/10">QR</button><button onclick="sendWA(${i}, 'receipt')" class="bg-emerald-500/10 text-emerald-500 rounded-lg py-2.5 flex items-center justify-center border border-emerald-500/20">${whatsappIcon}</button><button id="rem-btn-${i}" onclick="liveRemind(${i})" class="${remindBtnColor} border rounded-lg py-2.5 text-[9px] font-black uppercase">${rCount > 0 ? `REMIND x${rCount}` : 'REMIND'}</button></div><button id="settle-btn-${i}" onclick="liveSettle(${i})" class="w-full bg-mint text-white rounded-xl py-3 text-[11px] font-black uppercase shadow-md tracking-wider mt-2">SETTLE</button></div>`;
        }
    });
    applyFilters();
}
function setStatusFilter(f) { currentStatusFilter = f; document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.id === `filter-${f}`)); applyFilters(); }
function applyFilters() { const query = document.getElementById('studentSearch').value.toLowerCase(); let visible = 0; document.querySelectorAll('.student-card').forEach(card => { const matchName = card.dataset.name.includes(query); const matchStatus = currentStatusFilter === 'all' || card.dataset.status === currentStatusFilter; const isVisible = matchName && matchStatus; card.style.display = isVisible ? '' : 'none'; if (isVisible) visible++; }); document.getElementById('searchMeta').innerHTML = `${visible} shown`; }
function showQR(i) { document.getElementById('qrPriceDisplay').innerText = `₹${document.getElementById(`paid-${i}`)?.value || 0}`; document.getElementById('qrModal').style.display = 'flex'; }
function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
async function searchHomePlayers() {
    clearTimeout(homeSearchTimer);
    homeSearchTimer = setTimeout(async () => {
        const query = document.getElementById('homePlayerSearch').value.trim();
        const container = document.getElementById('homeSearchResults');
        if (query.length < 2) { container.innerHTML = ''; return; }
        const r = await fetch(`${SCRIPT_URL}?action=searchStudents&q=${encodeURIComponent(query)}`);
        const data = await r.json();
        container.innerHTML = data.students.map(s => `<button onclick="jumpToStudent('${s.batch}', '${s.name}')" class="bg-white dark:bg-zinc-900 w-full p-3 rounded-xl text-left border border-black/5 shadow-sm"><h4 class="text-sm font-bold">${escapeHtml(s.name)}</h4><p class="text-[9px] text-gray-500">${s.batch}</p></button>`).join('');
    }, 300);
}
function jumpToStudent(b, n) { document.getElementById('homePlayerSearch').value = n; selectBatch(b); }
</script>

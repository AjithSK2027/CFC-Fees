<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC Fees | Elite Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        pitch: '#050505', espresso: '#0F0A08', bean: '#1A1412',
                        mint: '#10B981', rose: '#F43F5E', gold: '#EAB308', orange: '#F97316'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #E5E7EB; -webkit-font-smoothing: antialiased; }
        .neo-blur { background: rgba(15, 10, 8, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .card-gradient { background: linear-gradient(165deg, #1A1412 0%, #0F0A08 100%); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-dark { background: #1A1412; border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; }
        #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .status-pill { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .pending { background: rgba(244, 63, 94, 0.1); color: #F43F5E; border: 1px solid rgba(244, 63, 94, 0.2); }
        .paid { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.2); }

        /* Reminder Persistent Colors */
        .remind-1 { background: rgba(234, 179, 8, 0.2) !important; color: #EAB308 !important; border-color: rgba(234, 179, 8, 0.4) !important; }
        .remind-2 { background: rgba(249, 115, 22, 0.2) !important; color: #F97316 !important; border-color: rgba(249, 115, 22, 0.4) !important; }
        .remind-3 { background: rgba(239, 68, 68, 0.2) !important; color: #F43F5E !important; border-color: rgba(239, 68, 68, 0.4) !important; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="qrModal" onclick="closeQR()">
        <div class="card-gradient p-8 rounded-[2.5rem] text-center space-y-6 max-w-xs w-full border-mint/20" onclick="event.stopPropagation()">
            <h3 class="text-mint font-900 uppercase text-[10px] tracking-widest">Generate UPI Payment</h3>
            <div class="bg-white p-4 rounded-3xl inline-block shadow-2xl">
                <img id="staticQR" src="https://i.ibb.co/f5dYVM1/Whats-App-Image-2026-04-08-at-12-56-51-PM.jpg" alt="CFC QR" class="w-48 h-48 object-contain">
            </div>
            <p class="text-white font-900 text-3xl" id="qrPriceDisplay">₹0</p>
            <button onclick="closeQR()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-bold text-xs uppercase tracking-widest">Dismiss</button>
        </div>
    </div>

    <header class="pt-8 px-6 flex justify-between items-center">
        <div class="space-y-1">
            <h1 class="text-xl font-900 tracking-tight text-white uppercase">CFC <span class="text-mint">Fees</span></h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em]">Financial Command</p>
        </div>
        <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-12 w-12 rounded-full border border-white/10 p-1 bg-espresso">
    </header>

    <div class="px-6 mt-8 grid grid-cols-2 gap-3">
        <select id="batchSelect" onchange="loadStudents()" class="input-dark p-4 text-xs font-bold outline-none">
            <option value="">Select Batch</option>
        </select>
        <input type="month" id="feeMonth" class="input-dark p-4 text-xs font-bold outline-none">
    </div>

    <main id="roster" class="px-6 mt-8 space-y-4">
        <div class="py-20 text-center text-gray-600 italic text-sm">Select batch to initialize ledger...</div>
    </main>

    <section id="logContainer" class="hidden px-6 mt-12 pb-24 space-y-4 border-t border-white/5 pt-8">
        <div class="flex items-center justify-between">
            <h3 class="text-[11px] font-900 text-white/40 uppercase tracking-widest">Follow-up Summary</h3>
            <span class="text-[9px] font-bold text-orange bg-orange/10 px-2 py-1 rounded-md">Persistent State</span>
        </div>
        <div id="logList" class="space-y-2"></div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 p-6 neo-blur border-t border-white/5 z-50">
        <button onclick="submitFees()" id="syncBtn" class="w-full bg-white text-pitch font-900 rounded-2xl py-5 text-[11px] uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
            Synchronize Cloud Ledger
        </button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypAQapaaL7dcbwcOeMun8O9Lc5jjElo8vj73e5wKJKyMv7uRMPRgk3KVc2OKKj_QaK9Q/exec"; 
        let students = [];

        window.onload = async () => {
            document.getElementById('feeMonth').value = new Date().toISOString().slice(0, 7);
            const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
            const d = await r.json();
            const s = document.getElementById('batchSelect');
            d.batches?.forEach(b => s.innerHTML += `<option value="${b.name}">${b.name}</option>`);
        };

        async function loadStudents() {
            const b = document.getElementById('batchSelect').value;
            if(!b) return;
            const roster = document.getElementById('roster');
            roster.innerHTML = '<div class="py-20 text-center text-mint font-bold uppercase text-[10px] tracking-widest animate-pulse">Accessing Secure Records...</div>';
            
            try {
                const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}`);
                const d = await r.json();
                students = (d.students || []).map(s => ({...s, verified: false}));
                render();
            } catch(e) { roster.innerHTML = '<div class="text-rose text-center font-bold">Fetch Error.</div>'; }
        }

        function render() {
            const container = document.getElementById('roster');
            const logContainer = document.getElementById('logContainer');
            const logList = document.getElementById('logList');
            container.innerHTML = ''; logList.innerHTML = '';
            let hasHistory = false;

            students.forEach((s, i) => {
                const fee = parseFloat(s.fees) || 0;
                
                // Color Logic based on Persistent Count from Sheet
                let btnState = "bg-white/5 text-white/40 border-white/10";
                if (s.remindCount === 1) btnState = "remind-1";
                else if (s.remindCount === 2) btnState = "remind-2";
                else if (s.remindCount >= 3) btnState = "remind-3";

                if (s.remindCount > 0) {
                    hasHistory = true;
                    logList.innerHTML += `
                        <div class="card-gradient rounded-xl p-3 flex justify-between items-center border-l-2 ${s.remindCount >= 3 ? 'border-l-rose' : 'border-l-orange'}">
                            <p class="text-xs font-bold text-white">${s.name}</p>
                            <span class="text-[9px] font-black text-white/30 uppercase tracking-widest">${s.lastReminded.split('at')[0]}</span>
                        </div>`;
                }

                container.innerHTML += `
                    <div class="card-gradient rounded-[2rem] p-5 space-y-5 animate-in fade-in slide-in-from-bottom-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-base font-800 text-white">${s.name}</h3>
                                <p class="text-[10px] text-mint font-bold opacity-60 uppercase mt-0.5">Mob: ${s.contact}</p>
                            </div>
                            <span id="stat-${i}" class="status-pill pending">Pending</span>
                        </div>

                        <div class="grid grid-cols-3 gap-2 py-3 border-y border-white/5 text-center">
                            <div><p class="text-[8px] font-bold text-gray-500 uppercase">Expected</p><p class="text-sm font-800 text-white/40">₹${fee}</p></div>
                            <div class="border-x border-white/5"><p class="text-[8px] font-bold text-gray-500 uppercase">Paid</p>
                                <input type="number" id="paid-${i}" value="0" oninput="calc(${i}, ${fee})" class="bg-transparent text-mint text-sm font-900 w-full text-center outline-none">
                            </div>
                            <div><p class="text-[8px] font-bold text-gray-500 uppercase">Balance</p><p id="pend-${i}" class="text-sm font-900 text-rose">₹${fee}</p></div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1"><p class="text-[8px] font-bold text-gray-500 uppercase ml-1">Method</p>
                                <div class="flex gap-2">
                                    <select id="type-${i}" class="bg-bean text-[10px] p-3 flex-1 font-bold rounded-xl outline-none"><option>UPI</option><option>CASH</option></select>
                                    <button onclick="showQR(${i})" class="bg-mint/10 text-mint rounded-xl px-3 border border-mint/20 active:scale-90"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg></button>
                                </div>
                            </div>
                            <div class="space-y-1"><p class="text-[8px] font-bold text-gray-500 uppercase ml-1">PST</p>
                                <input id="pst-${i}" type="text" placeholder="Coach Name" class="bg-bean text-[10px] p-3 w-full font-bold rounded-xl border border-white/5 outline-none">
                            </div>
                        </div>

                        <div id="action-area-${i}" class="flex gap-2 pt-2">
                            <button onclick="sendWA(${i}, 'received')" class="flex-1 bg-mint/10 text-mint border border-mint/20 rounded-xl py-4 text-[10px] font-black uppercase active:scale-95 transition-all">Confirm Receipt</button>
                            <button onclick="sendWA(${i}, 'remind')" id="remind-btn-${i}" class="flex-1 ${btnState} border rounded-xl py-4 text-[10px] font-black uppercase active:scale-95 transition-all">
                                ${s.remindCount > 0 ? `Reminder x${s.remindCount}` : 'Send Reminder'}
                            </button>
                        </div>
                    </div>`;
            });
            if(hasHistory) logContainer.classList.remove('hidden');
        }

        function showQR(i) { document.getElementById('qrPriceDisplay').innerText = `₹${document.getElementById(`paid-${i}`).value || 0}`; document.getElementById('qrModal').style.display = 'flex'; }
        function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

        function calc(i, total) {
            const p = parseFloat(document.getElementById(`paid-${i}`).value) || 0;
            const b = total - p;
            document.getElementById(`pend-${i}`).innerText = `₹${b}`;
            const s = document.getElementById(`stat-${i}`);
            if (b <= 0) { s.innerText = "Paid"; s.className = `status-pill paid`; document.getElementById(`pend-${i}`).className = "text-sm font-900 text-mint"; }
            else { s.innerText = "Pending"; s.className = `status-pill pending`; document.getElementById(`pend-${i}`).className = "text-sm font-900 text-rose"; }
        }

        function sendWA(i, type) {
            const s = students[i];
            const p = document.getElementById(`paid-${i}`).value || 0;
            const b = document.getElementById(`pend-${i}`).innerText;
            const m = new Date(document.getElementById('feeMonth').value + "-01").toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            let ph = s.contact.toString().replace(/\D/g, ''); if (!ph.startsWith('91')) ph = '91' + ph;
            let text = "";

            if (type === 'remind') {
                s.remindCount++;
                const now = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
                s.lastReminded = `${now} at ${new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })} x${s.remindCount}`;
                text = `⚽ *COFFEELAND FC: FEE NOTICE* ⚽\n\nDear Sir/Madam,\n\nReminder regarding fees for *${s.name}* (${m}).\n\n*Amount Due:* ${b}\nUPI: 8867742269@ptaxis`;
                render();
            } else {
                text = `✅ *COFFEELAND FC: PAYMENT RECEIVED* ✅\n\nReceived ₹${p} for *${s.name}* (${m}).\n\n*Balance:* ${b}\n\nThank you!`;
                document.getElementById(`action-area-${i}`).innerHTML = `<div class="flex-1 flex justify-center bg-mint/20 text-mint rounded-xl py-4 border border-mint/40 uppercase font-black text-[10px]">Verified & Sent</div>`;
            }
            window.open(`https://wa.me/${ph}?text=${encodeURIComponent(text)}`);
        }

        async function submitFees() {
            const btn = document.getElementById('syncBtn');
            const logs = students.map((s, i) => ({
                name: s.name, contact: s.contact, batch: s.batch, fees: s.fees,
                feeType: document.getElementById(`type-${i}`).value,
                paidTo: document.getElementById(`pst-${i}`).value,
                paidAmount: document.getElementById(`paid-${i}`).value,
                pending: document.getElementById(`pend-${i}`).innerText.replace('₹', ''),
                status: document.getElementById(`stat-${i}`).innerText,
                lastReminded: s.lastReminded || ""
            })).filter(r => parseFloat(r.paidAmount) > 0 || r.lastReminded !== "");

            if(!logs.length) return alert("No changes detected.");
            btn.innerText = "SYNCING CLOUD..."; btn.disabled = true;
            const fd = new URLSearchParams();
            fd.append('payload', JSON.stringify({ action: 'saveFees', month: document.getElementById('feeMonth').value, data: logs }));
            try { await fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' }); alert("Cloud Ledger Synced."); loadStudents(); }
            catch(e) { alert("Error."); btn.disabled = false; btn.innerText = "Synchronize Cloud Ledger"; }
        }
    </script>
</body>
</html>

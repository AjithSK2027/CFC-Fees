<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeeland FC • Fees Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: #fbbf24;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .title h1 {
            color: white;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .title p {
            color: #737373;
            font-size: 14px;
            font-weight: 400;
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            gap: 8px;
            background: #1a1a1a;
            padding: 6px;
            border-radius: 40px;
            border: 1px solid #2a2a2a;
        }

        .toggle-option {
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            background: transparent;
            color: #737373;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-option.active {
            background: #fbbf24;
            color: #111111;
        }

        .total-collected {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 12px 24px;
        }

        .total-collected span {
            color: #737373;
            font-size: 14px;
        }

        .total-collected strong {
            color: #fbbf24;
            font-size: 18px;
            font-weight: 600;
            margin-left: 12px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 20px;
        }

        .stat-label {
            color: #737373;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }

        .stat-number {
            color: white;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .stat-number.gold {
            color: #fbbf24;
        }

        /* Filters */
        .filters {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .filter-group label {
            display: block;
            color: #737373;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }

        .filter-group select {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            outline: none;
        }

        .filter-group select:hover {
            border-color: #404040;
        }

        .filter-group select:focus {
            border-color: #fbbf24;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #1a1a1a;
            color: white;
            border: 1px solid #2a2a2a;
        }

        .btn:hover {
            background: #242424;
            border-color: #404040;
        }

        .btn-primary {
            background: #fbbf24;
            color: #111111;
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #f59e0b;
        }

        /* Table */
        .table-container {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 4px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th {
            text-align: left;
            padding: 20px 16px;
            color: #737373;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #222222;
        }

        td {
            padding: 16px;
            color: white;
            font-size: 14px;
            border-bottom: 1px solid #1a1a1a;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-paid {
            background: #05966920;
            color: #10b981;
            border: 1px solid #10b98130;
        }

        .status-pending {
            background: #d9770620;
            color: #f59e0b;
            border: 1px solid #f59e0b30;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-paid {
            background: #05966920;
            color: #10b981;
            border: 1px solid #10b98130;
        }

        .action-paid:hover:not(:disabled) {
            background: #05966940;
        }

        .action-paid:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-remind {
            background: #fbbf2420;
            color: #fbbf24;
            border: 1px solid #fbbf2430;
        }

        .action-remind:hover {
            background: #fbbf2440;
        }

        .action-edit {
            background: #3b82f620;
            color: #3b82f6;
            border: 1px solid #3b82f630;
        }

        .action-edit:hover {
            background: #3b82f640;
        }

        .whatsapp-number {
            color: #fbbf24;
            font-size: 13px;
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            color: white;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
        }

        .modal-content input:focus {
            border-color: #fbbf24;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 16px 24px;
            color: white;
            font-size: 14px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-color: #10b981;
        }

        .toast.error {
            border-color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #737373;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <div class="logo">
                    <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" alt="Coffeeland FC">
                </div>
                <div class="title">
                    <h1>Coffeeland FC</h1>
                    <p>Fee Management</p>
                </div>
            </div>
            
            <div class="toggle-container">
                <button class="toggle-option active" id="toggleRegular" onclick="setFeeType('regular')">Regular</button>
                <button class="toggle-option" id="toggleSummer" onclick="setFeeType('summer')">Summer Camp</button>
            </div>
            
            <div class="total-collected">
                <span>Total collected</span>
                <strong id="totalCollected">₹0</strong>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total fees</div>
                <div class="stat-number gold" id="totalFees">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Collected</div>
                <div class="stat-number" id="collected">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-number" id="pending">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Collection rate</div>
                <div class="stat-number" id="collectionRate">0%</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Batch</label>
                    <select id="batchSelect" onchange="loadStudents()">
                        <option value="">Select batch</option>
                        <option value="Kalyan Nagar">Kalyan Nagar</option>
                        <option value="Xavier's School">Xavier's School</option>
                        <option value="Monti Angels">Monti Angels</option>
                        <option value="District Field Morning">District Field Morning</option>
                        <option value="District Field Evening">District Field Evening</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Month</label>
                    <select id="monthSelect" onchange="loadStudents()">
                        <option value="Jan 2026">January 2026</option>
                        <option value="Feb 2026">February 2026</option>
                        <option value="Mar 2026">March 2026</option>
                        <option value="Apr 2026">April 2026</option>
                        <option value="May 2026">May 2026</option>
                        <option value="Jun 2026">June 2026</option>
                        <option value="Jul 2026">July 2026</option>
                        <option value="Aug 2026">August 2026</option>
                        <option value="Sep 2026">September 2026</option>
                        <option value="Oct 2026">October 2026</option>
                        <option value="Nov 2026">November 2026</option>
                        <option value="Dec 2026">December 2026</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Status</label>
                    <select id="statusSelect" onchange="filterTable()">
                        <option value="all">All</option>
                        <option value="Paid">Paid</option>
                        <option value="Pending">Pending</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="applyDefaultFees()">Apply Default</button>
                    <button class="btn" onclick="syncData()">Sync</button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Batch</th>
                        <th>Month</th>
                        <th>WhatsApp</th>
                        <th>Total</th>
                        <th>Paid</th>
                        <th>Pending</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="9" class="empty-state">
                            Select a batch and month to view students
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- WhatsApp Modal -->
    <div class="modal" id="whatsappModal">
        <div class="modal-content">
            <h3>Update WhatsApp</h3>
            <input type="text" id="whatsappInput" placeholder="Enter number (e.g., 919876543210)">
            <div style="color: #737373; font-size: 12px; margin-top: -12px; margin-bottom: 20px;">Include country code without +</div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="saveWhatsApp()">Save</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Fees Modal -->
    <div class="modal" id="feesModal">
        <div class="modal-content">
            <h3>Set Total Fees</h3>
            <input type="number" id="feesInput" placeholder="Enter amount" min="1">
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="saveFees()">Save</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Configuration - YOUR WEB APP URL IS ALREADY INSERTED HERE
        const SHEET_ID = '1EhkGO3omreFx_cbIWM9ZMQbTtWkTT2tm4ePgN-Ii8GQ';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzaNyTxkqd5cAqDi6ALwivDAkBWa79osUbVKe8OscwkELF0qGvJaQ8-1ug95rg5Ap9W/exec';

        // Fee structure
        const FEES = {
            regular: {
                'Kalyan Nagar': 1200,
                'Xavier\'s School': 500,
                'District Field Morning': 800,
                'District Field Evening': 800
            },
            summer: {
                'Kalyan Nagar': 1500,
                'District Field Morning': 1000,
                'District Field Evening': 1000
            }
        };

        // Student data
        const STUDENTS = {
            'Kalyan Nagar': [
                'MOHITH.S', 'Rishanth R Shekar', 'Gahan', 'RUTVIK', 'Sohan R Prasad',
                'Gagan gowda.B.M', 'Mohith T', 'Gokul', 'THEJAS KN', 'CHIRANTH BK',
                'Shrinik U Y', 'HIMAVANTH CJ', 'Ganav r', 'SHAMAN GOWDA N N',
                'SHRIMAN GOWDA N N', 'Dhanvith p Gowda', 'Dhanyatha p', 'Swayam',
                'Samanvith Rao D M', 'Sai pranav', 'Dishanth HL', 'Manvith.S',
                'RAJATH .S', 'Nishanth S. V', 'Hoysala M Hrushikesh'
            ],
            'Xavier\'s School': [
                'AIMA', 'PREETHAM HM', 'SAMBRAMA.S', 'DHANVISH', 'VISMITHA',
                'YASHWANTH BJ', 'ULLAS', 'JASHITH C', 'SAMARTH', 'SARVAJITH',
                'THANUSH', 'PUNITH', 'PAVAN', 'BHUVAN S', 'CHIRANTH', 'AARIZ',
                'RIVON', 'DEEKSHA', 'PRAJWAL', 'ANHAR', 'UMAIR', 'AVINASH',
                'LIKITH', 'SOHAN', 'KRUTHIK', 'SAAMAR', 'LIKITHA', 'IBRAHIM',
                'MALCUM', 'SAMARTH B', 'VINISH', 'SHAUN D', 'GOKUL', 'CHIRANJITH M',
                'HUSNA', 'ASJAD', 'IMPAN'
            ],
            'Monti Angels': [
                'MD IFAZ', 'AAHIL', 'MD RAAFI', 'MD AAZZ', 'UMAR', 'UNAIZ',
                'AFFAN', 'RISHAN', 'MD ARHAAN', 'MD YUSUF ARMAN', 'KSHAMAN U.G',
                'RISHIK PONNAPPA', 'IRSHAD BAIG', 'MD HAMZA', 'SK SAMDHANI',
                'MD SHAYAN', 'MD UMAR', 'NOUFAL U.S', 'MD RIFAHATH', 'MD ARHAN',
                'MD ARMAAN NAWAZ', 'MD MUBASHER', 'ABDUL AZEEM', 'SHINAF IBRAHIM',
                'ANTHONY', 'TANISH SHANBOGH', 'MOHAN GOWDA', 'MOHAMMED SHARIQ',
                'MD RAHIL', 'SK AZIZ', 'AMAN BAIG', 'HARSHAVARDHANA', 'MD RAYAAN',
                'AARIZ RAZA', 'MEHHAROOF', 'PAYAM', 'PAIMAN', 'RISHAB', 'TALHA',
                'RAHIL', 'ISMAIL', 'YADHUVAMSHIK', 'AFNAN', 'SHISHIR'
            ],
            'District Field Morning': ['Arjun', 'Rahul'],
            'District Field Evening': ['Karthik', 'Suresh']
        };

        // State
        let currentFeeType = 'regular';
        let currentBatch = '';
        let currentMonth = 'Jan 2026';
        let students = [];
        let selectedStudent = null;
        let timeout;

        // Initialize
        window.onload = () => {
            setFeeType('regular');
            loadStudents();
        };

        // Set fee type
        function setFeeType(type) {
            currentFeeType = type;
            
            document.getElementById('toggleRegular').classList.remove('active');
            document.getElementById('toggleSummer').classList.remove('active');
            document.getElementById(`toggle${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.add('active');
            
            const monthSelect = document.getElementById('monthSelect');
            if (type === 'summer') {
                monthSelect.innerHTML = '<option value="Summer Camp 2026">Summer Camp 2026</option>';
                currentMonth = 'Summer Camp 2026';
            } else {
                monthSelect.innerHTML = `
                    <option value="Jan 2026">January 2026</option>
                    <option value="Feb 2026">February 2026</option>
                    <option value="Mar 2026">March 2026</option>
                    <option value="Apr 2026">April 2026</option>
                    <option value="May 2026">May 2026</option>
                    <option value="Jun 2026">June 2026</option>
                    <option value="Jul 2026">July 2026</option>
                    <option value="Aug 2026">August 2026</option>
                    <option value="Sep 2026">September 2026</option>
                    <option value="Oct 2026">October 2026</option>
                    <option value="Nov 2026">November 2026</option>
                    <option value="Dec 2026">December 2026</option>
                `;
                currentMonth = 'Jan 2026';
            }
            
            loadStudents();
        }

        // Load students
        function loadStudents() {
            const batch = document.getElementById('batchSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            if (!batch || !month) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty-state">Select a batch and month</td></tr>';
                return;
            }
            
            currentBatch = batch;
            currentMonth = month;
            
            const studentList = STUDENTS[batch] || [];
            students = studentList.map(name => ({
                studentName: name,
                batch: batch,
                month: month,
                feeType: currentFeeType,
                whatsapp: '',
                totalFees: 0,
                paid: 0,
                pending: 0,
                status: 'Pending'
            }));
            
            loadFromSheet();
        }

        // Load from sheet
        async function loadFromSheet() {
            try {
                const url = `${WEB_APP_URL}?action=getFees&batch=${currentBatch}&month=${currentMonth}&feeType=${currentFeeType}&sheetId=${SHEET_ID}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.data) {
                    const savedMap = {};
                    data.data.forEach(s => savedMap[s.studentName] = s);
                    
                    students = students.map(s => savedMap[s.studentName] || s);
                }
                
                renderTable();
                calculateStats();
                
            } catch (error) {
                renderTable();
                calculateStats();
            }
        }

        // Render table
        function renderTable() {
            const status = document.getElementById('statusSelect').value;
            
            let filtered = students;
            if (status !== 'all') {
                filtered = students.filter(s => s.status === status);
            }
            
            if (filtered.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty-state">No students found</td></tr>';
                return;
            }
            
            let html = '';
            filtered.forEach(s => {
                const statusClass = s.status === 'Paid' ? 'status-paid' : 'status-pending';
                
                html += `
                    <tr>
                        <td>${s.studentName}</td>
                        <td>${s.batch}</td>
                        <td>${s.month}</td>
                        <td>
                            ${s.whatsapp ? 
                                `<span class="whatsapp-number">${s.whatsapp}</span>` : 
                                `<button class="action-btn action-edit" onclick="showWhatsAppModal('${s.studentName}')">Add</button>`}
                        </td>
                        <td>${s.totalFees ? `₹${s.totalFees}` : 
                              `<button class="action-btn action-edit" onclick="showFeesModal('${s.studentName}')">Set</button>`}</td>
                        <td>₹${s.paid}</td>
                        <td>₹${s.pending}</td>
                        <td><span class="status-badge ${statusClass}">${s.status}</span></td>
                        <td>
                            <div class="action-buttons">
                                ${s.status !== 'Paid' ? 
                                    `<button class="action-btn action-paid" onclick="markPaid('${s.studentName}')">Mark Paid</button>` :
                                    `<button class="action-btn action-paid" disabled>Paid</button>`
                                }
                                <button class="action-btn action-remind" onclick="sendReminder('${s.studentName}')">Remind ✨</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('tableBody').innerHTML = html;
        }

        // Calculate stats
        function calculateStats() {
            let total = 0, paid = 0;
            
            students.forEach(s => {
                total += s.totalFees || 0;
                paid += s.paid || 0;
            });
            
            const rate = total > 0 ? Math.round((paid / total) * 100) : 0;
            
            document.getElementById('totalFees').textContent = `₹${total.toLocaleString()}`;
            document.getElementById('collected').textContent = `₹${paid.toLocaleString()}`;
            document.getElementById('pending').textContent = `₹${(total - paid).toLocaleString()}`;
            document.getElementById('collectionRate').textContent = `${rate}%`;
            document.getElementById('totalCollected').textContent = `₹${paid.toLocaleString()}`;
        }

        // Apply default fees
        function applyDefaultFees() {
            if (!currentBatch) {
                showToast('Select a batch first', 'error');
                return;
            }
            
            const amount = FEES[currentFeeType]?.[currentBatch];
            
            if (amount) {
                let count = 0;
                students.forEach(s => {
                    if (!s.totalFees) {
                        s.totalFees = amount;
                        s.pending = amount - s.paid;
                        count++;
                    }
                });
                
                renderTable();
                calculateStats();
                showToast(`✨ Applied ₹${amount} to ${count} students ✨`, 'success');
            } else {
                showToast('No default fee for this batch', 'error');
            }
        }

        // Mark as paid
        function markPaid(name) {
            const student = students.find(s => s.studentName === name);
            if (!student || !student.totalFees) {
                showToast('Set total fees first', 'error');
                return;
            }
            
            if (!confirm(`🎉 Mark ${name} as paid?`)) return;
            
            student.paid = student.totalFees;
            student.pending = 0;
            student.status = 'Paid';
            
            saveStudent(student);
            renderTable();
            calculateStats();
            showToast(`🎉 ${name} marked as paid! Amazing! 🎉`, 'success');
        }

        // Show WhatsApp modal
        function showWhatsAppModal(name) {
            selectedStudent = students.find(s => s.studentName === name);
            document.getElementById('whatsappInput').value = selectedStudent?.whatsapp || '';
            document.getElementById('whatsappModal').style.display = 'flex';
        }

        // Save WhatsApp
        async function saveWhatsApp() {
            const whatsapp = document.getElementById('whatsappInput').value.trim();
            if (selectedStudent) {
                selectedStudent.whatsapp = whatsapp;
                await saveStudent(selectedStudent);
                renderTable();
                closeModal();
                showToast('📱 WhatsApp number saved!', 'success');
            }
        }

        // Show fees modal
        function showFeesModal(name) {
            selectedStudent = students.find(s => s.studentName === name);
            document.getElementById('feesInput').value = selectedStudent?.totalFees || '';
            document.getElementById('feesModal').style.display = 'flex';
        }

        // Save fees
        async function saveFees() {
            const amount = parseFloat(document.getElementById('feesInput').value);
            if (amount && selectedStudent) {
                selectedStudent.totalFees = amount;
                selectedStudent.pending = amount - (selectedStudent.paid || 0);
                selectedStudent.status = selectedStudent.pending <= 0 ? 'Paid' : 'Pending';
                
                await saveStudent(selectedStudent);
                renderTable();
                calculateStats();
                closeModal();
                showToast('💰 Fees saved!', 'success');
            }
        }

        // Save student to sheet
        async function saveStudent(student) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'saveFees',
                        sheetId: SHEET_ID,
                        student: student
                    })
                });
            } catch (error) {
                console.error('Save error:', error);
            }
        }

        // Send friendly WhatsApp reminder
        function sendReminder(name) {
            const student = students.find(s => s.studentName === name);
            
            if (!student?.whatsapp) {
                showToast('Please add WhatsApp number first', 'error');
                return;
            }
            
            // Clean phone number
            const phone = student.whatsapp.replace(/\D/g, '');
            
            // Friendly messages
            const greetings = [
                "Hey! 👋",
                "Hello there! ⚽",
                "Hi friend! 🌟",
                "Greetings! ☕",
                "What's up! 🫶"
            ];
            
            const closings = [
                "See you on the field! ⚽",
                "Keep shining! ✨",
                "Can't wait to see you play! 🌟",
                "Let's make this month awesome! 💪",
                "You're doing great! 🏆",
                "Together we grow! 🌱",
                "Football family forever! 🖤💛"
            ];
            
            const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            const randomClosing = closings[Math.floor(Math.random() * closings.length)];
            
            // Friendly message
            const message = `${randomGreeting}%0a%0a` +
                            `This is your friendly Coffeeland FC fee reminder! 🫶⚽%0a%0a` +
                            `━━━━━━━━━━━━━━━━%0a` +
                            `📋 *Your Summary*%0a` +
                            `━━━━━━━━━━━━━━━━%0a` +
                            `👤 *Student:* ${student.studentName}%0a` +
                            `🏃 *Batch:* ${student.batch}%0a` +
                            `📅 *Month:* ${student.month}%0a` +
                            `━━━━━━━━━━━━━━━━%0a` +
                            `💰 *Fee Details*%0a` +
                            `━━━━━━━━━━━━━━━━%0a` +
                            `💵 Total: ₹${student.totalFees}%0a` +
                            `✅ Paid: ₹${student.paid}%0a` +
                            `⏳ Pending: ₹${student.pending} ${student.pending === 0 ? '🎉' : '💝'}%0a` +
                            `━━━━━━━━━━━━━━━━%0a%0a` +
                            `⚽ *Quick Payment Options:*%0a` +
                            `• UPI: coffeeland@okhdfcbank%0a` +
                            `• Google Pay: 9876543210%0a` +
                            `• Cash at the field%0a%0a` +
                            `Drop a message after payment so we can update immediately! 📱%0a%0a` +
                            `${randomClosing}%0a` +
                            `– Your Coffeeland FC Team 💛🖤`;
            
            // Open WhatsApp
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
            
            showToast('✨ WhatsApp opened with friendly reminder! ✨', 'success');
        }

        // Sync data
        async function syncData() {
            for (const student of students) {
                await saveStudent(student);
            }
            showToast('🔄 All data synced to sheet!', 'success');
        }

        // Filter table
        function filterTable() {
            renderTable();
        }

        // Show toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modal
        function closeModal() {
            document.getElementById('whatsappModal').style.display = 'none';
            document.getElementById('feesModal').style.display = 'none';
        }

        // Close modals on click outside
        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        };
    </script>
</body>
</html>

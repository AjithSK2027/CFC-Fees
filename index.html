<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC Fees | Command V3.2 Adaptive</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CFC Fees">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { pitch: '#050505', espresso: '#0F0A08', bean: '#1A1412', mint: '#10B981', rose: '#F43F5E', gold: '#EAB308' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-body: #F9FAFB;
            --bg-header: rgba(249, 250, 251, 0.85);
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-gray: #6B7280;
            --border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #050505;
                --bg-header: rgba(5, 5, 5, 0.6);
                --bg-card: linear-gradient(165deg, #1A1412 0%, #0F0A08 100%);
                --text-main: #E5E7EB;
                --text-gray: #9CA3AF;
                --border: rgba(255, 255, 255, 0.05);
                --card-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            }
        }

        body { background-color: var(--bg-body); color: var(--text-main); -webkit-font-smoothing: antialiased; transition: all 0.3s ease; }
        
        /* THE NOTCH FIX */
        header { 
            background-color: var(--bg-header); 
            padding-top: calc(env(safe-area-inset-top) + 1.2rem) !important;
            padding-bottom: 1rem;
        }

        .card-gradient { background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--card-shadow); }
        .input-dark { background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; }
        
        /* ADJUST VIEW TOP MARGINS */
        #lobbyView, #commandView { margin-top: 1.5rem; }

        .hidden-view { display: none !important; }
        #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #batchGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .tile-aspect { aspect-ratio: 1 / 1; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="qrModal" onclick="closeQR()">
        <div class="card-gradient p-8 rounded-[2.5rem] text-center space-y-6 max-w-xs w-full">
            <h3 class="text-mint font-900 uppercase text-[10px] tracking-widest">Scan to Pay</h3>
            <img src="https://i.ibb.co/f5dYVM1/Whats-App-Image-2026-04-08-at-12-56-51-PM.jpg" class="w-48 mx-auto rounded-3xl border-4 border-white shadow-2xl">
            <p class="font-900 text-3xl text-current" id="qrPriceDisplay">₹0</p>
            <button onclick="closeQR()" class="w-full py-4 rounded-2xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-current font-bold text-xs uppercase">Close</button>
        </div>
    </div>

    <header class="px-6 flex justify-between items-center sticky top-0 backdrop-blur-md z-40">
        <div onclick="goHome()" class="cursor-pointer">
            <h1 class="text-xl font-900 text-current uppercase leading-none">CFC <span class="text-mint">Fees</span></h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-widest uppercase mt-1">Command Center</p>
        </div>
        <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-10 w-10">
    </header>

    <div id="lobbyView" class="px-6 transition-all duration-300">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-4 text-center">Select Hub</h2>
        <div class="mb-8">
            <select id="homeBatchSelect" onchange="selectBatch(this.value)" class="input-dark p-4 text-xs font-bold outline-none w-full shadow-lg">
                <option value="">Quick Jump to Batch...</option>
            </select>
        </div>
        <div id="batchGrid"></div>
    </div>

    <div id="commandView" class="hidden-view">
        <div class="px-6 space-y-6">
            <div class="card-gradient rounded-[2rem] p-6 grid grid-cols-3 gap-2 text-center">
                <div><p class="text-[8px] font-bold text-gray-500 uppercase">Target</p><p id="dashTarget" class="text-sm font-900 text-current">₹0</p></div>
                <div class="border-x border-black/5 dark:border-white/5"><p class="text-[8px] font-bold text-gray-500 uppercase">Received</p><p id="dashPaid" class="text-sm font-900 text-mint">₹0</p></div>
                <div><p class="text-[8px] font-bold text-gray-500 uppercase">Pending</p><p id="dashPending" class="text-sm font-900 text-rose">₹0</p></div>
            </div>

            <div class="flex gap-3">
                <select id="batchSelect" onchange="loadStudents()" class="input-dark p-4 text-xs font-bold outline-none flex-1"></select>
                <input type="date" id="feeDate" onchange="loadStudents()" class="input-dark p-4 text-xs font-bold outline-none w-1/3">
            </div>

            <main id="roster" class="mt-4 space-y-4"></main>
        </div>
    </div>

    <div id="syncContainer" class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 dark:bg-pitch/80 backdrop-blur-lg border-t border-black/5 dark:border-white/5 hidden-view z-50">
        <button onclick="submitFees()" id="syncBtn" class="w-full bg-mint text-white dark:text-pitch font-900 rounded-2xl py-5 text-[11px] uppercase tracking-widest shadow-lg shadow-mint/20 active:scale-95 transition-all">Synchronize Clean Ledger</button>
    </div>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwTMVQhglZmJu76XbbRKhU_ejNxrb6bMRAkCYmpVcGj-RHxYkR-MiUqmnCB7NMv8ig0w/exec"; 
    let students = [];

    window.onload = async () => {
        document.getElementById('feeDate').value = new Date().toISOString().split('T')[0];
        const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
        const d = await r.json();
        
        const s = document.getElementById('batchSelect');
        const hs = document.getElementById('homeBatchSelect');
        const grid = document.getElementById('batchGrid');
        
        s.innerHTML = '<option value="">Switch Batch</option>';
        hs.innerHTML = '<option value="">Quick Jump to Batch...</option>';

        d.batches?.forEach(b => {
            const opt = `<option value="${b.name}">${b.name}</option>`;
            s.innerHTML += opt;
            hs.innerHTML += opt;

            grid.innerHTML += `
                <div onclick="selectBatch('${b.name}')" class="card-gradient p-5 rounded-[2.5rem] flex flex-col justify-between tile-aspect active:scale-95 transition-all">
                    <div class="bg-mint/10 w-10 h-10 rounded-2xl flex items-center justify-center text-mint text-lg">⚽</div>
                    <div>
                        <h3 class="text-[13px] font-800 text-current leading-tight mb-1">${b.name}</h3>
                        <p class="text-[8px] text-mint font-black uppercase tracking-widest">Enter Hub</p>
                    </div>
                </div>`;
        });
    };

    function selectBatch(n) { 
        if(!n) return;
        document.getElementById('batchSelect').value = n; 
        loadStudents(); 
    }

    function goHome() { 
        document.getElementById('lobbyView').classList.remove('hidden-view');
        document.getElementById('commandView').classList.add('hidden-view');
        document.getElementById('syncContainer').classList.add('hidden-view');
        document.getElementById('homeBatchSelect').value = "";
    }

    async function loadStudents() {
        const b = document.getElementById('batchSelect').value;
        const d = document.getElementById('feeDate').value;
        if(!b) return;
        document.getElementById('lobbyView').classList.add('hidden-view');
        document.getElementById('commandView').classList.remove('hidden-view');
        document.getElementById('syncContainer').classList.remove('hidden-view');
        document.getElementById('roster').innerHTML = '<div class="py-20 text-center text-mint font-bold animate-pulse text-[10px] uppercase">Refreshing Cloud Data...</div>';
        try {
            const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}&date=${d}`);
            const data = await r.json();
            students = data.students || []; 
            updateDashboard();
            render();
        } catch(e) { alert("Data Fetch Error"); }
    }

    function updateDashboard() {
        let t = 0, p = 0, b = 0;
        students.forEach(s => { t += Number(s.fees); p += Number(s.paidSoFar); b += Number(s.balance); });
        document.getElementById('dashTarget').innerText = `₹${t}`;
        document.getElementById('dashPaid').innerText = `₹${p}`;
        document.getElementById('dashPending').innerText = `₹${b}`;
    }

    function render() {
        const container = document.getElementById('roster');
        container.innerHTML = ''; 
        students.forEach((s, i) => {
            const isPaid = Number(s.balance) <= 0 || s.tempPaid;
            let btnColor = (s.remindCount > 0) ? "bg-gold/20 text-gold border-gold/30" : "bg-black/5 dark:bg-white/5 text-gray-500 border-black/10 dark:border-white/10";
            
            const currentPaidTotal = Number(s.paidSoFar) + Number(s.manualAmt || 0);
            const currentBalance = Math.max(0, s.fees - currentPaidTotal);

            let content = isPaid ? `
                <div class="bg-mint/10 border border-mint/20 rounded-2xl p-4 space-y-3">
                    <div class="flex items-center justify-between">
                        <p class="text-[9px] font-black text-mint uppercase tracking-widest">₹${s.manualAmt || (s.fees - s.paidSoFar)} Recorded</p>
                        <button onclick="sendWA(${i}, 'receipt')" class="bg-mint text-white dark:text-pitch px-4 py-2 rounded-lg text-[10px] font-black uppercase">Receipt</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-2 border-t border-mint/10 text-center">
                        <div><p class="text-[7px] font-bold text-gray-500 uppercase">Target</p><p class="text-[9px] font-bold text-current">₹${s.fees}</p></div>
                        <div class="border-x border-mint/10"><p class="text-[7px] font-bold text-gray-500 uppercase">Paid</p><p class="text-[9px] font-bold text-mint">₹${currentPaidTotal}</p></div>
                        <div><p class="text-[7px] font-bold text-gray-500 uppercase">Balance</p><p class="text-[9px] font-bold ${currentBalance <= 0 ? 'text-mint' : 'text-rose'}">₹${currentBalance}</p></div>
                    </div>
                </div>` : `
                <div class="grid grid-cols-2 gap-4 py-3 border-y border-black/5 dark:border-white/5 text-center">
                    <div><p class="text-[8px] font-bold text-gray-500 uppercase">Collect</p><input type="number" id="paid-${i}" placeholder="₹0" oninput="calc(${i}, ${s.balance})" class="bg-transparent text-mint text-lg font-900 w-full text-center outline-none"></div>
                    <div><p class="text-[8px] font-bold text-gray-500 uppercase">Pending</p><p id="pend-${i}" class="text-lg font-900 text-rose">₹${s.balance}</p></div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="showQR(${i})" class="bg-black/5 dark:bg-white/5 text-current px-4 rounded-xl border border-black/10 dark:border-white/10 text-[10px] font-bold">QR</button>
                    <button onclick="sendWA(${i}, 'receipt')" class="flex-1 bg-mint text-white dark:text-pitch rounded-xl py-4 text-[10px] font-black uppercase">Settle</button>
                    <button onclick="sendWA(${i}, 'remind')" class="flex-1 ${btnColor} border rounded-xl py-4 text-[10px] font-black uppercase">${s.remindCount > 0 ? `Remind x${s.remindCount}` : 'Remind'}</button>
                </div>`;

            container.innerHTML += `<div class="card-gradient rounded-[2rem] p-5 space-y-4">
                <div class="flex justify-between items-start"><div><h3 class="text-base font-800 text-current">${s.name}</h3><p class="text-[9px] text-gray-500 font-bold uppercase">${s.contact}</p></div><span class="px-3 py-1 rounded-lg text-[9px] font-black uppercase ${isPaid ? 'bg-mint/10 text-mint' : 'bg-rose/10 text-rose'}">${isPaid ? 'Paid' : 'Pending'}</span></div>
                ${content}</div>`;
        });
    }

    function showQR(i) { document.getElementById('qrPriceDisplay').innerText = `₹${document.getElementById(`paid-${i}`).value || 0}`; document.getElementById('qrModal').style.display = 'flex'; }
    function closeQR() { document.getElementById('qrModal').style.display = 'none'; }
    function calc(i, b) { const v = parseFloat(document.getElementById(`paid-${i}`).value) || 0; document.getElementById(`pend-${i}`).innerText = `₹${b - v}`; }

    function sendWA(i, type) {
        const s = students[i], p = document.getElementById(`paid-${i}`)?.value || 0;
        const dVal = document.getElementById('feeDate').value;
        const dateObj = new Date(dVal);
        const displayDate = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        let ph = s.contact.replace(/\D/g, ''); if (!ph.startsWith('91')) ph = '91' + ph;
        
        if(type === 'remind') {
            const count = (s.remindCount || 0) + 1;
            s.remindCount = count;
            s.newRemindSent = true; 
            let msg = "";
            const payLink = "upi.pe/8867742269@ptaxis";
            if (count === 1) {
                msg = `Dear Sir/Madam,\n\nGreetings from *Coffeeland FC*! ⚽\n\nWe are happy to share that *${s.name}* is active and progressing well in our *${s.batch}* batch. To ensure their training momentum continues, kindly settle the pending fees.\n\n*Due:* ₹${s.balance}\n*Date:* ${displayDate}\n*Pay Link:* ${payLink}\n\nYour support helps us provide the best coaching for our young athletes. Thank you!\n\n*Team Coffeeland FC*`;
            } else if (count === 2) {
                msg = `Dear Sir/Madam,\n\nHope you are doing well! We love having *${s.name}* on the pitch as they continue their athletic journey in the *${s.batch}* batch. 📈\n\nThis is a gentle follow-up regarding the outstanding fees of *₹${s.balance}* for *${displayDate}*. We would appreciate it if you could settle this via the link below:\n\n*Pay Link:* ${payLink}\n\nThank you for your cooperation!\n\n*Team Coffeeland FC*`;
            } else {
                msg = `Dear Sir/Madam,\n\nGreetings from the Management at *Coffeeland FC*. ⚽\n\nRegarding *${s.name}* and their participation in the *${s.batch}* batch, we are reaching out to coordinate the pending fee settlement of *₹${s.balance}*.\n\nKindly use the link below to help us update our records for *${displayDate}*:\n\n*Quick Pay:* ${payLink}\n\nThank you for your immediate attention to this.\n\n*Team Coffeeland FC*`;
            }
            window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`);
            render();
        } else {
            const settleAmt = parseFloat(p) > 0 ? parseFloat(p) : s.balance;
            const remainingBalance = Math.max(0, s.balance - settleAmt);
            s.manualAmt = settleAmt; s.tempPaid = true;
            let msg = `Dear Sir/Madam,\n\n*CFC PAYMENT RECEIPT* ✅\n\nReceived *₹${settleAmt}* for *${s.name}* (${s.batch} batch) on *${displayDate}*.`;
            if (remainingBalance > 0) { msg += `\n\n*Remaining Balance:* ₹${remainingBalance}\n_Kindly settle the balance at your earliest convenience._`; }
            else { msg += `\n\n*Status:* Fully Paid. All records updated!`; }
            msg += `\n\nThank you for your payment and for supporting your child's athletic growth!\n\n*Team Coffeeland FC*`;
            window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`);
            render();
        }
    }

    async function submitFees() {
        const btn = document.getElementById('syncBtn'), dVal = document.getElementById('feeDate').value;
        const logs = students.map((s, i) => {
            const inputVal = parseFloat(document.getElementById(`paid-${i}`)?.value || 0);
            const finalAmt = s.tempPaid ? (s.manualAmt || s.balance) : inputVal;
            if (finalAmt <= 0 && !s.newRemindSent) return null;
            return {
                name: s.name, contact: s.contact, batch: s.batch, fees: s.fees, 
                paidSoFar: s.paidSoFar, feeType: "UPI", paidTo: "Admin", 
                paidAmount: finalAmt, newRemindSent: s.newRemindSent || false, remindCount: s.remindCount || 0
            };
        }).filter(x => x !== null);
        if (!logs.length) return alert("Nothing to sync");
        btn.innerText = "UPDATING CLOUD..."; btn.disabled = true;
        const fd = new URLSearchParams();
        fd.append('payload', JSON.stringify({ action: 'saveFees', date: dVal, data: logs }));
        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
            const res = await response.json();
            if (res.status === 'success') { alert("Cloud Synced!"); location.reload(); }
        } catch (e) { alert("Error"); btn.disabled = false; }
    }
    </script>
</body>
</html>

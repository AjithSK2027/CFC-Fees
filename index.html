<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC Fees | Command Pro v5.9</title>

    <link rel="apple-touch-icon" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        pitch: '#050505', espresso: '#0F0A08', bean: '#1A1412',
                        mint: '#10B981', rose: '#F43F5E', gold: '#EAB308'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-body: #F6F8FB; --bg-header: rgba(246, 248, 251, 0.82);
            --bg-card: rgba(255, 255, 255, 0.88); --bg-card-solid: #FFFFFF;
            --text-main: #111827; --border: rgba(17, 24, 39, 0.08);
            --card-shadow: 0 18px 50px -24px rgba(17, 24, 39, 0.24);
            --mint-soft: rgba(16, 185, 129, 0.10);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #050505; --bg-header: rgba(5, 5, 5, 0.68);
                --bg-card: rgba(20, 20, 20, 0.88); --bg-card-solid: #0F0A08;
                --text-main: #E5E7EB; --border: rgba(255, 255, 255, 0.06);
            }
        }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        header { background-color: var(--bg-header); padding-top: calc(env(safe-area-inset-top) + 1.1rem) !important; padding-bottom: 1rem; backdrop-filter: blur(14px); }
        .card-gradient { background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--card-shadow); backdrop-filter: blur(14px); border-radius: 2rem; }
        .hidden-view { display: none !important; }
        #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        
        /* DARK MODE INPUT FIX */
        .input-dark {
            background-color: var(--bg-card-solid);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        
        @media (prefers-color-scheme: dark) {
            .input-dark {
                background-color: #1A1A1A;
                color: #FFFFFF !important;
                border-color: rgba(255, 255, 255, 0.1);
            }
            input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        }

        .filter-chip { border: 1px solid var(--border); background: rgba(0,0,0,0.04); color: #6B7280; transition: all 0.2s; cursor: pointer; }
        .filter-chip.active { background: #10B981; color: white; border-color: transparent; }
        .month-chip { cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); }
        .month-chip.selected { background: #10B981; color: white; border-color: transparent; }
        .search-shell { background: linear-gradient(180deg, var(--mint-soft), rgba(255,255,255,0.02)); border: 1px solid var(--border); }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="qrModal" onclick="this.style.display='none'">
        <div class="card-gradient p-8 rounded-[2.5rem] text-center space-y-6 max-w-xs w-full">
            <h3 class="text-mint font-black uppercase text-[10px] tracking-widest">Scan to Pay</h3>
            <img src="https://i.ibb.co/f5dYVM1/Whats-App-Image-2026-04-08-at-12-56-51-PM.jpg" class="w-48 mx-auto rounded-3xl border-4 border-white shadow-2xl">
            <p class="font-black text-3xl text-current" id="qrPriceDisplay">₹0</p>
        </div>
    </div>

    <header class="px-6 flex justify-between items-center sticky top-0 z-40">
        <div onclick="location.reload()" class="cursor-pointer">
            <h1 class="text-xl font-black uppercase leading-none">CFC <span class="text-mint text-emerald-500">Fees</span></h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-widest uppercase mt-1">Command Center</p>
        </div>
        <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-10 w-10">
    </header>

    <div id="lobbyView" class="px-6 transition-all duration-300 space-y-5 mt-6">
        <div class="space-y-3">
            <select id="homeBatchSelect" onchange="selectBatch(this.value)" class="input-dark p-4 text-xs font-bold w-full outline-none shadow-lg">
                <option value="">Quick Jump...</option>
            </select>
            <div class="search-shell rounded-[1.4rem] p-3">
                <div class="flex items-center gap-3">
                    <div class="text-lg">🔎</div>
                    <input id="homePlayerSearch" type="text" placeholder="Search player from any batch..." oninput="searchHomePlayers()" class="bg-transparent w-full outline-none text-sm font-bold placeholder:text-gray-400">
                </div>
            </div>
            <div id="homeSearchResults" class="space-y-2"></div>
        </div>
        <div id="batchGrid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="commandView" class="hidden-view px-6 space-y-6 mt-6">
        <div class="card-gradient p-6 grid grid-cols-3 gap-3 text-center">
            <div><p class="text-[8px] font-bold text-gray-500 uppercase">Target</p><p id="dashTarget" class="text-sm font-black">₹0</p></div>
            <div class="border-x border-black/5 dark:border-white/5"><p class="text-[8px] font-bold text-gray-500 uppercase">Received</p><p id="dashPaid" class="text-sm font-black text-mint">₹0</p></div>
            <div><p class="text-[8px] font-bold text-gray-500 uppercase">Pending</p><p id="dashPending" class="text-sm font-black text-rose">₹0</p></div>
        </div>

        <div class="flex gap-3">
            <select id="batchSelect" onchange="loadStudents()" class="input-dark p-4 text-xs font-bold flex-1 outline-none"></select>
            <input type="date" id="feeDate" onchange="loadStudents()" class="input-dark p-4 text-xs font-bold w-1/3 outline-none">
        </div>

        <div class="search-shell rounded-[1.4rem] p-3">
            <div class="flex items-center gap-3">
                <div class="text-lg">🔎</div>
                <input id="studentSearch" type="text" placeholder="Search in batch..." oninput="applyFilters()" class="bg-transparent w-full outline-none text-sm font-bold">
            </div>
        </div>

        <div class="flex items-center justify-between gap-3">
            <div class="flex gap-2">
                <button id="filter-all" onclick="setStatusFilter('all')" class="filter-chip active px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">All</button>
                <button id="filter-pending" onclick="setStatusFilter('pending')" class="filter-chip px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Pending</button>
                <button id="filter-paid" onclick="setStatusFilter('paid')" class="filter-chip px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Paid</button>
            </div>
            <p id="searchMeta" class="text-[10px] font-bold text-mint whitespace-nowrap">0 shown</p>
        </div>

        <main id="roster" class="space-y-4 pb-20"></main>
    </div>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyy-8Tb03kaD-_dTPXeaGZ_vpF63fNAOZZPRN3SHFxGnma5PgLOa5pD3jNolQj2e8Cg6g/exec";
    let students = [];
    let currentStatusFilter = 'all';
    let homeSearchTimer = null;

    window.onload = async () => {
        document.getElementById('feeDate').value = new Date().toISOString().split('T')[0];
        try {
            const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
            const d = await r.json();
            const grid = document.getElementById('batchGrid');
            const hSelect = document.getElementById('homeBatchSelect');
            const bSelect = document.getElementById('batchSelect');
            d.batches?.forEach(b => {
                const opt = `<option value="${b.name}">${b.name}</option>`;
                hSelect.innerHTML += opt; bSelect.innerHTML += opt;
                grid.innerHTML += `<button onclick="selectBatch('${b.name}')" class="card-gradient p-5 flex flex-col justify-between aspect-square text-left active:scale-95 transition-all"><div class="text-xl">⚽</div><div><h3 class="text-[13px] font-extrabold uppercase">${b.name}</h3><p class="text-[8px] text-mint font-black uppercase tracking-widest">Enter Hub</p></div></button>`;
            });
        } catch (e) { alert("Unable to load hubs"); }
    };

    function selectBatch(n) { document.getElementById('batchSelect').value = n; loadStudents(); }

    async function searchHomePlayers() {
        clearTimeout(homeSearchTimer);
        homeSearchTimer = setTimeout(async () => {
            const query = document.getElementById('homePlayerSearch').value.trim();
            const container = document.getElementById('homeSearchResults');
            if (query.length < 2) { container.innerHTML = ''; return; }
            const r = await fetch(`${SCRIPT_URL}?action=searchStudents&q=${encodeURIComponent(query)}`);
            const data = await r.json();
            container.innerHTML = data.students.map(s => `
                <button onclick="jumpToStudent('${s.batch}', '${s.name}')" class="bg-white dark:bg-zinc-900 w-full p-4 rounded-2xl text-left border border-black/5 shadow-sm">
                    <h4 class="text-sm font-bold">${s.name}</h4><p class="text-[10px] text-gray-500">${s.batch}</p>
                </button>`).join('');
        }, 300);
    }

    function jumpToStudent(b, n) { document.getElementById('homePlayerSearch').value = n; selectBatch(b); }

    async function loadStudents() {
        const b = document.getElementById('batchSelect').value;
        if (!b) return;
        document.getElementById('lobbyView').classList.add('hidden-view');
        document.getElementById('commandView').classList.remove('hidden-view');
        document.getElementById('roster').innerHTML = '<p class="py-20 text-center text-mint font-bold animate-pulse text-[10px] uppercase">Cloud Syncing...</p>';
        const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}`);
        const data = await r.json();
        students = data.students || [];
        updateDashboard(); render();
    }

    function generateMonthChips(i) {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const curDate = new Date();
        const curMonth = curDate.getMonth();
        let html = '';
        for (let j = 0; j <= 3; j++) {
            let mIdx = curMonth - j; if (mIdx < 0) mIdx += 12;
            html += `<div onclick="toggleMonth(${i}, ${j})" id="mchip-${i}-${j}" class="month-chip ${j === 0 ? 'selected' : ''} px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase">${months[mIdx]}</div>`;
        }
        return html;
    }

    function toggleMonth(i, j) { document.getElementById(`mchip-${i}-${j}`).classList.toggle('selected'); calcBalance(i); }

    function calcBalance(i) {
        const s = students[i];
        const months = document.querySelectorAll(`[id^="mchip-${i}-"].selected`).length;
        const paidInput = parseFloat(document.getElementById(`paid-${i}`).value || 0);
        const newPend = Math.max(0, (s.fees * months) - (s.paidSoFar + paidInput));
        document.getElementById(`pend-${i}`).innerText = `₹${newPend}`;
    }

    function render() {
        const container = document.getElementById('roster');
        container.innerHTML = '';
        students.forEach((s, i) => {
            const isPaid = s.tempPaid || s.balance <= 0;
            const currentStatus = isPaid ? 'paid' : 'pending';
            
            const rCount = Number(s.remindCount || 0);
            let btnColor = "bg-black/5 text-gray-500 border-black/10";
            if (rCount === 1) btnColor = "bg-yellow-400/20 text-yellow-700 border-yellow-400/30";
            if (rCount === 2) btnColor = "bg-orange-400/20 text-orange-700 border-orange-400/30";
            if (rCount >= 3) btnColor = "bg-red-500/20 text-red-700 border-red-500/30";

            container.innerHTML += `
                <div class="student-card card-gradient p-5 space-y-4" 
                     data-name="${s.name.toLowerCase()}" 
                     data-status="${currentStatus}">
                    <div class="flex justify-between items-start">
                        <div><h3 class="text-base font-extrabold">${s.name}</h3><p class="text-[9px] text-gray-500 font-bold uppercase">${s.contact}</p></div>
                        <span class="px-3 py-1 rounded-lg text-[9px] font-black uppercase ${isPaid ? 'bg-mint/10 text-mint' : 'bg-rose/10 text-rose'}">
                            ${isPaid ? 'Paid' : 'Pending'}
                        </span>
                    </div>
                    ${isPaid ? `
                        <div class="bg-mint/10 border border-mint/20 rounded-2xl p-4 space-y-2">
                            <div class="flex justify-between items-center">
                                <p class="text-[9px] font-black text-mint uppercase">DRAFTED SUCCESS</p>
                                <button onclick="sendWA(${i}, 'receipt')" class="w-10 bg-mint/20 text-mint flex items-center justify-center rounded-xl p-2">💬</button>
                            </div>
                            <div class="space-y-1 pt-2 border-t border-mint/10">
                                <p class="text-[9px] font-bold text-gray-600">Amount Paid: <span class="text-mint">₹${s.lastPaidAmt || s.paidSoFar}</span></p>
                                <p class="text-[9px] font-bold text-gray-600">Months Covered: <span class="text-mint">${s.lastMonthsCount || 'Current'}</span></p>
                                <p class="text-[9px] font-bold text-gray-600">Recorded Balance: <span class="${s.balance > 0 ? 'text-rose' : 'text-mint'}">₹${s.balance}</span></p>
                                ${s.note ? `<p class="text-[9px] italic text-gray-500 pt-1">Note: ${s.note}</p>` : ''}
                            </div>
                        </div>
                    ` : `
                        <div class="grid grid-cols-2 gap-4 py-3 border-y border-black/5 dark:border-white/5 text-center">
                            <div><p class="text-[8px] font-bold text-gray-500 uppercase">Collect</p><input type="number" id="paid-${i}" placeholder="₹0" oninput="calcBalance(${i})" class="bg-transparent text-mint text-lg font-black w-full text-center outline-none"></div>
                            <div><p class="text-[8px] font-bold text-gray-500 uppercase">Pending</p><p id="pend-${i}" class="text-lg font-black text-rose">₹${s.balance}</p></div>
                        </div>
                        <div class="space-y-2"><p class="text-[7px] font-black text-gray-400 uppercase">Select Months</p><div class="flex gap-2">${generateMonthChips(i)}</div></div>
                        <div class="grid grid-cols-2 gap-3">
                            <select id="type-${i}" class="input-dark text-[10px] p-3 font-bold rounded-xl outline-none"><option>UPI</option><option>CASH</option></select>
                            <input id="pst-${i}" type="text" placeholder="Paid To" class="input-dark text-[10px] p-3 w-full font-bold rounded-xl outline-none">
                        </div>
                        <input id="note-${i}" type="text" placeholder="Add Note..." class="input-dark text-[10px] p-3 w-full font-bold rounded-xl outline-none">
                        <div class="flex gap-2">
                            <button onclick="showQR(${i})" class="bg-black/5 px-4 rounded-xl text-[10px] font-bold border border-black/10">QR</button>
                            <button id="settle-btn-${i}" onclick="liveSettle(${i})" class="flex-1 bg-mint text-white rounded-xl py-4 text-[10px] font-black uppercase shadow-lg shadow-mint/20">Settle Only</button>
                            <button onclick="sendWA(${i}, 'receipt')" class="w-12 bg-emerald-500/10 text-emerald-500 flex items-center justify-center rounded-xl text-lg border border-emerald-500/10">💬</button>
                            <button id="rem-btn-${i}" onclick="liveRemind(${i})" class="flex-1 ${btnColor} border border-black/10 rounded-xl py-4 text-[10px] font-black uppercase">
                                ${rCount > 0 ? `Remind x${rCount}` : 'Remind'}
                            </button>
                        </div>
                    `}
                </div>`;
        });
        applyFilters();
    }

    function setStatusFilter(f) { 
        currentStatusFilter = f; 
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.id === `filter-${f}`)); 
        applyFilters(); 
    }

    function applyFilters() {
        const query = document.getElementById('studentSearch').value.toLowerCase();
        let visible = 0;
        document.querySelectorAll('.student-card').forEach(card => {
            const matchName = card.dataset.name.includes(query);
            const matchStatus = currentStatusFilter === 'all' || card.dataset.status === currentStatusFilter;
            const isVisible = matchName && matchStatus;
            card.style.display = isVisible ? '' : 'none'; 
            if (isVisible) visible++;
        });
        document.getElementById('searchMeta').innerText = `${visible} shown`;
    }

    async function liveSettle(i) {
        const s = students[i]; const btn = document.getElementById(`settle-btn-${i}`);
        const amt = parseFloat(document.getElementById(`paid-${i}`).value || 0);
        const months = document.querySelectorAll(`[id^="mchip-${i}-"].selected`).length;
        if (amt <= 0) return alert("Enter amount");
        btn.innerText = "SAVING..."; btn.disabled = true;

        const newBalance = Math.max(0, (s.fees * months) - (s.paidSoFar + amt));
        const record = { 
            name: s.name, contact: s.contact, batch: s.batch, fees: s.fees, 
            paidAmount: amt, balance: newBalance, monthsCovered: months, 
            feeType: document.getElementById(`type-${i}`).value, 
            paidTo: document.getElementById(`pst-${i}`).value, 
            note: document.getElementById(`note-${i}`).value 
        };

        try {
            const r = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: new URLSearchParams({ payload: JSON.stringify({ action: 'saveFees', date: document.getElementById('feeDate').value, data: [record] }) })
            });
            const out = await r.json();
            if (out.status === 'success') { 
                s.tempPaid = true; 
                s.lastPaidAmt = amt;
                s.lastMonthsCount = months;
                s.paidSoFar += amt; 
                s.balance = newBalance; 
                s.note = record.note;
                updateDashboard(); render(); 
            }
        } catch (e) { 
            alert("Sync Failed"); 
            btn.innerText = "Settle Only"; btn.disabled = false; 
        }
    }

    async function liveRemind(i) {
        const s = students[i];
        const btn = document.getElementById(`rem-btn-${i}`);
        btn.innerText = "LOGGING...";
        const newCount = (Number(s.remindCount) || 0) + 1;
        
        const record = { name: s.name, batch: s.batch, newRemindSent: true, remindCount: newCount, paidAmount: 0 };
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ payload: JSON.stringify({ action: 'saveFees', date: document.getElementById('feeDate').value, data: [record] }) })});
            s.remindCount = newCount;
            render();
            sendWA(i, 'remind');
        } catch (e) { s.remindCount = newCount; render(); sendWA(i, 'remind'); }
    }

    function sendWA(i, type) {
        const s = students[i]; let ph = String(s.contact || '').replace(/\D/g, ''); if (!ph.startsWith('91')) ph = '91' + ph;
        const msg = type === 'receipt' ? `*CFC RECEIPT* ✅\n\nPayment received for *${s.name}*.\n*Balance:* ₹${s.balance}` : `*CFC REMINDER* ⚽\n\nDear Parent, pending fees for *${s.name}* is ₹${s.balance}. Kindly settle soon.`;
        window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`);
    }

    function updateDashboard() {
        let t = 0, p = 0, b = 0; students.forEach(s => { t += Number(s.fees); p += Number(s.paidSoFar); b += Number(s.balance); });
        document.getElementById('dashTarget').innerText = `₹${t}`; document.getElementById('dashPaid').innerText = `₹${p}`; document.getElementById('dashPending').innerText = `₹${b}`;
    }

    function showQR(i) { document.getElementById('qrPriceDisplay').innerText = `₹${document.getElementById(`paid-${i}`)?.value || 0}`; document.getElementById('qrModal').style.display = 'flex'; }
    </script>
</body>
</html>

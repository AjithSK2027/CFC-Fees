<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFC Premium Fees</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        coffee: {
                            950: '#0D0907',
                            900: '#150E0A',
                            800: '#1E140F',
                            accent: '#D4AF37', /* Gold */
                            goldHover: '#F1D375',
                            light: '#F5E6D3'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0D0907;
            color: #F5E6D3;
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .glass-card {
            background: linear-gradient(160deg, rgba(30, 20, 15, 0.95) 0%, rgba(21, 14, 10, 0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .input-premium {
            background: rgba(13, 9, 7, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
            outline: none;
        }

        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #B89328 100%);
            color: #0D0907;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: all 0.2s active;
        }

        .btn-gold:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Modern Toggle */
        .premium-switch input:checked + .slider { background: #D4AF37; }
        .premium-switch input:checked + .slider:before { transform: translateX(20px); background: #0D0907; }
        .slider {
            width: 44px; height: 24px; background: rgba(255,255,255,0.1);
            border-radius: 30px; position: relative; transition: .4s; cursor: pointer;
        }
        .slider:before {
            content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background: white; border-radius: 50%; transition: .4s;
        }

        .paid-glow { border-left: 4px solid #D4AF37 !important; background: rgba(212, 175, 55, 0.05) !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-list { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <div class="max-w-xl mx-auto px-5 pt-10 space-y-8">
        
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter text-white">COFFEELAND <span class="text-coffee-accent">FC</span></h1>
                <p class="text-[10px] font-bold text-coffee-accent uppercase tracking-[0.2em] opacity-80">Fee Collection Portal</p>
            </div>
            <div class="h-12 w-12 rounded-full border border-coffee-accent/30 p-1 bg-coffee-800/40">
                <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="rounded-full">
            </div>
        </header>

        <div class="glass-card rounded-[2rem] p-6 flex justify-around items-center border-t-2 border-t-coffee-accent/20">
            <div class="text-center">
                <p class="text-[9px] uppercase font-black text-coffee-light/40 tracking-widest mb-1">Expected</p>
                <p class="text-xl font-bold" id="ui-expected">₹0</p>
            </div>
            <div class="h-8 w-[1px] bg-white/10"></div>
            <div class="text-center">
                <p class="text-[9px] uppercase font-black text-coffee-accent tracking-widest mb-1">Collected</p>
                <p class="text-xl font-bold text-coffee-accent" id="ui-collected">₹0</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex gap-3">
                <div class="flex-1">
                    <select id="batchFilter" onchange="filterRoster()" class="input-premium w-full rounded-2xl p-4 text-sm font-medium appearance-none">
                        <option value="Loading">Loading Batches...</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <input type="month" id="feeMonth" class="input-premium w-full rounded-2xl p-4 text-sm font-medium">
                </div>
            </div>
            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-coffee-accent/50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </span>
                <input type="text" id="searchInput" oninput="filterRoster()" placeholder="Search Athlete Name..." class="input-premium w-full rounded-2xl py-4 pl-12 pr-4 text-sm">
            </div>
        </div>

        <div id="roster" class="space-y-3">
            <div class="py-20 text-center space-y-3 opacity-50">
                <div class="inline-block w-6 h-6 border-2 border-coffee-accent/20 border-t-coffee-accent rounded-full animate-spin"></div>
                <p class="text-xs font-medium tracking-widest uppercase">Syncing Ledger...</p>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-coffee-950 via-coffee-950 to-transparent z-50">
        <div class="max-w-xl mx-auto">
            <button onclick="commitTransactions()" id="submitBtn" class="btn-gold w-full py-5 rounded-[1.5rem] text-sm uppercase flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Commit to Fees Sheet
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "YOUR_NEW_DEPLOYED_URL_HERE"; // <--- UPDATE THIS
        let masterData = [];

        // Set Default Month
        document.getElementById('feeMonth').value = new Date().toISOString().slice(0, 7);

        // 1. Initial Load: Batches & Students
        window.onload = async () => {
            try {
                // Load Batches
                const bResp = await fetch(`${WEB_APP_URL}?action=getBatches`);
                const bData = await bResp.json();
                const select = document.getElementById('batchFilter');
                select.innerHTML = '<option value="All">All Active Batches</option>';
                bData.batches.forEach(b => {
                    select.innerHTML += `<option value="${b.name}">${b.name}</option>`;
                });

                // Load Students
                const sResp = await fetch(`${WEB_APP_URL}?action=getStudents`);
                const sData = await sResp.json();
                masterData = sData.students;
                filterRoster();
            } catch (e) {
                document.getElementById('roster').innerHTML = `<p class="text-center text-red-400 py-10">Connection Error. Verify Web App URL.</p>`;
            }
        };

        // 2. Filter Logic (Search + Batch)
        function filterRoster() {
            const batch = document.getElementById('batchFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('roster');
            container.innerHTML = '';

            let filtered = masterData.filter(s => 
                (batch === 'All' || s.batch === batch) && 
                (s.name.toLowerCase().includes(search))
            );

            let expectedTotal = 0;
            let collectedTotal = 0;

            filtered.forEach((s, i) => {
                const feeInt = parseInt(s.fees.replace(/[^\d]/g, '')) || 0;
                expectedTotal += feeInt;

                const card = document.createElement('div');
                card.className = `glass-card p-5 rounded-3xl flex items-center justify-between border-l-4 border-l-transparent transition-all duration-300 animate-list`;
                card.style.animationDelay = `${i * 0.03}s`;
                card.id = `card-${i}`;

                card.innerHTML = `
                    <div class="flex-1 pr-4">
                        <h3 class="font-bold text-white tracking-wide">${s.name}</h3>
                        <div class="flex items-center gap-3 mt-1.5">
                            <span class="batch-text text-[9px] font-bold text-coffee-accent uppercase tracking-tighter bg-coffee-accent/5 px-2 py-0.5 rounded border border-coffee-accent/10">${s.batch}</span>
                            <span class="fee-text text-sm font-bold text-coffee-light/60">₹${feeInt}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <a href="https://wa.me/${s.contact.replace(/\s+/g, '')}?text=Hi ${s.name}, your CFC Fees for ${document.getElementById('feeMonth').value} is pending." class="text-green-500/80 active:scale-90 transition-transform">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.012 2c-5.508 0-9.987 4.479-9.987 9.988 0 1.757.459 3.404 1.258 4.838l-1.341 4.903 5.034-1.321c1.408.767 3.013 1.207 4.72 1.207 5.508 0 9.988-4.479 9.988-9.988 0-5.509-4.48-9.988-9.988-9.988zm4.847 14.125c-.215.604-1.231 1.154-1.688 1.21-.456.056-.897.272-2.923-.526-2.438-.962-4.004-3.438-4.125-3.601-.121-.162-1.021-1.356-1.021-2.585 0-1.23.645-1.834.872-2.087.227-.254.495-.317.659-.317.164 0 .328.001.47.009.15.007.351-.057.549.421.199.479.68 1.659.739 1.779.059.121.099.261.019.421-.079.16-.12.261-.24.4-.12.14-.251.312-.359.419-.12.12-.244.251-.106.489.138.238.613 1.011 1.315 1.636.903.805 1.666 1.053 1.904 1.173.238.12.378.1.517-.059.14-.16.598-.696.758-.935.16-.24.32-.201.539-.12.22.08 1.396.658 1.636.777.24.12.399.18.459.28.06.1.06.579-.155 1.183z"/></svg>
                        </a>
                        <label class="premium-switch">
                            <input type="checkbox" class="hidden" onchange="togglePayment(this, ${feeInt}, 'card-${i}')">
                            <div class="slider"></div>
                        </label>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('ui-expected').innerText = `₹${expectedTotal}`;
            updateCollected(0);
        }

        // 3. UI Helpers
        let currentCollected = 0;
        function togglePayment(cb, amount, cardId) {
            const card = document.getElementById(cardId);
            if (cb.checked) {
                currentCollected += amount;
                card.classList.add('paid-glow');
            } else {
                currentCollected -= amount;
                card.classList.remove('paid-glow');
            }
            updateCollected(currentCollected);
        }

        function updateCollected(val) {
            document.getElementById('ui-collected').innerText = `₹${val}`;
        }

        // 4. Submit to Fees Sheet
        async function commitTransactions() {
            const btn = document.getElementById('submitBtn');
            const month = document.getElementById('feeMonth').value;
            const checks = document.querySelectorAll('input[type="checkbox"]:checked');
            
            if (checks.length === 0) {
                alert("Gold Rule: Select at least one paid athlete first.");
                return;
            }

            const originalBtn = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Syncing Gold...</span>`;

            const dataToLog = [];
            checks.forEach(cb => {
                const parent = cb.closest('.glass-card');
                dataToLog.push({
                    name: parent.querySelector('h3').innerText,
                    batch: parent.querySelector('.batch-text').innerText,
                    amount: parent.querySelector('.fee-text').innerText.replace('₹', ''),
                    status: 'Paid'
                });
            });

            try {
                const formData = new URLSearchParams();
                formData.append('payload', JSON.stringify({ month, data: dataToLog }));

                // Using POST to append rows to Fees sheet
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                alert(`Ledger Updated. ${dataToLog.length} payments logged for ${month}.`);
                location.reload(); // Refresh to clear session
            } catch (e) {
                alert("Comm-link failed.");
                btn.disabled = false;
                btn.innerHTML = originalBtn;
            }
        }
    </script>
</body>
</html>

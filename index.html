<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFC Fees | Final Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0D0907; color: #F5E6D3; font-family: 'Outfit', sans-serif; background-attachment: fixed; }
        .glass-card { background: rgba(30, 20, 15, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-gold { background: #000; border: 1px solid rgba(212, 175, 55, 0.3); color: white; border-radius: 12px; }
        .status-badge { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .pending { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid #D4AF37; }
        .paid { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid #10B981; }
        #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .qr-frame { background: white; padding: 12px; border-radius: 20px; }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #0D0907 80%, transparent); padding: 20px; z-index: 50; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="qrModal" onclick="closeQR()">
        <div class="glass-card p-8 rounded-[2.5rem] text-center space-y-5 max-w-xs w-full border-[#D4AF37]" onclick="event.stopPropagation()">
            <h3 class="text-[#D4AF37] font-black uppercase text-xs tracking-widest">Scan to Pay</h3>
            <div class="qr-frame inline-block">
                <img id="staticQR" src="https://i.ibb.co/f5dYVM1/Whats-App-Image-2026-04-08-at-12-56-51-PM.jpg" alt="CFC QR" class="w-56 h-56 object-contain">
            </div>
            <p class="text-white font-black text-2xl mt-2" id="qrPriceDisplay">₹0</p>
            <p class="text-white/50 font-bold text-sm tracking-tight">COFFEELAND FC OFFICIAL</p>
            <button onclick="closeQR()" class="w-full py-3 rounded-xl bg-white/5 border border-white/10 text-white/40 font-bold text-xs uppercase tracking-widest">Tap to Close</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-extrabold text-white tracking-tighter uppercase">Coffeeland <span class="text-[#D4AF37]">FC</span></h1>
            <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-12 w-12 rounded-full border border-[#D4AF37]/30 p-1">
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <select id="batchSelect" onchange="loadStudents()" class="input-gold p-4 text-sm font-bold w-full">
                <option value="">-- Select Batch --</option>
            </select>
            <input type="month" id="feeMonth" class="input-gold p-4 text-sm font-bold w-full">
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-[#1A1410] text-[10px] uppercase font-black text-gray-500 tracking-widest">
                        <tr>
                            <th class="p-6">Athlete</th>
                            <th class="p-6">Method / PST</th>
                            <th class="p-6">Expected</th>
                            <th class="p-6">Paid</th>
                            <th class="p-6">Balance</th>
                            <th class="p-6 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="roster" class="divide-y divide-white/5 font-medium">
                        <tr><td colspan="6" class="p-32 text-center text-coffee-accent/40 italic">Select Batch to Load Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <div class="max-w-6xl mx-auto">
            <button onclick="submitFees()" id="syncBtn" class="w-full bg-gradient-to-r from-[#D4AF37] to-[#B89328] text-black font-black rounded-2xl py-5 text-xs uppercase tracking-widest shadow-xl transition-all">
                Sync Ledger & Finalize
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhMqGlvOjcYsMVD20whdfoXhrlH4ukCUqumBO4tcwi6d9-I4o88H3jtcoFWVbHOdYEYg/exec"; 
        let students = [];

        window.onload = async () => {
            document.getElementById('feeMonth').value = new Date().toISOString().slice(0, 7);
            const r = await fetch(`${SCRIPT_URL}?action=getBatches`);
            const d = await r.json();
            const s = document.getElementById('batchSelect');
            d.batches.forEach(b => s.innerHTML += `<option value="${b.name}">${b.name}</option>`);
        };

        async function loadStudents() {
            const b = document.getElementById('batchSelect').value;
            if(!b) return;
            const r = await fetch(`${SCRIPT_URL}?action=getStudents&batch=${encodeURIComponent(b)}`);
            const d = await r.json();
            students = d.students || [];
            render();
        }

        function render() {
            const tbody = document.getElementById('roster');
            tbody.innerHTML = '';
            students.forEach((s, i) => {
                const fee = parseFloat(s.fees) || 0;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-6">
                            <div class="font-bold text-white text-base">${s.name}</div>
                            <div class="text-[10px] text-[#D4AF37] opacity-60">📱 ${s.contact}</div>
                        </td>
                        <td class="p-6 space-y-2">
                            <div class="flex gap-2">
                                <select id="type-${i}" class="input-gold text-[10px] p-2 flex-1 font-bold"><option>UPI</option><option>CASH</option></select>
                                <button onclick="showQR(${fee})" class="bg-[#D4AF37] text-black rounded-lg px-3 text-[9px] font-black uppercase">QR</button>
                            </div>
                            <input id="pst-${i}" type="text" placeholder="Paid To..." class="input-gold text-[10px] p-2 w-full font-bold">
                        </td>
                        <td class="p-6 font-bold text-white/40">₹${fee}</td>
                        <td class="p-6"><input type="number" id="paid-${i}" value="0" oninput="calc(${i}, ${fee})" class="input-gold w-24 p-2 font-black text-emerald-400 text-center"></td>
                        <td class="p-6">
                            <div id="pend-${i}" class="font-black text-rose-400 text-base">₹${fee}</div>
                            <span id="stat-${i}" class="status-badge pending">Pending</span>
                            <div id="last-remind-${i}" class="text-[9px] text-white/30 italic mt-1"></div>
                        </td>
                        <td class="p-6">
                            <div class="flex flex-col gap-2">
                                <button onclick="sendWA(${i}, 'received')" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-xl py-2 text-[9px] font-black uppercase">Confirm</button>
                                <button onclick="sendWA(${i}, 'remind')" class="bg-white/5 text-white/40 border border-white/10 rounded-xl py-2 text-[9px] font-black uppercase">Remind</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function showQR(amount) { 
            document.getElementById('qrPriceDisplay').innerText = `₹${amount}`;
            document.getElementById('qrModal').style.display = 'flex'; 
        }

        function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

        function calc(i, total) {
            const paid = document.getElementById(`paid-${i}`).value || 0;
            const pend = total - paid;
            document.getElementById(`pend-${i}`).innerText = `₹${pend}`;
            const s = document.getElementById(`stat-${i}`);
            s.innerText = pend <= 0 ? "Paid" : "Pending";
            s.className = `status-badge ${pend <= 0 ? 'paid' : 'pending'}`;
        }

        function sendWA(i, type) {
            const s = students[i];
            const paid = document.getElementById(`paid-${i}`).value || 0;
            const pend = document.getElementById(`pend-${i}`).innerText;
            const rawMonth = document.getElementById('feeMonth').value;
            const dateObj = new Date(rawMonth + "-01");
            const monthName = dateObj.toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            
            if (type === 'remind') {
                const now = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
                s.lastReminded = now;
                document.getElementById(`last-remind-${i}`).innerText = `Sent: ${now}`;
            }

            const text = type === 'remind' 
                ? `⚽ *CFC REMINDER* ⚽\nHi ${s.name}, fees for ${monthName} is pending (₹${s.fees}). Balance: ${pend}. Pay: https://upi.pe/8867742269@ptaxis`
                : `✅ *CFC RECEIPT* ✅\nHi ${s.name}, Received ₹${paid} for ${monthName}. Balance: ${pend}. Thank you!`;
            
            window.open(`https://wa.me/${s.contact}?text=${encodeURIComponent(text)}`);
        }

        async function submitFees() {
            const btn = document.getElementById('syncBtn');
            const rawMonth = document.getElementById('feeMonth').value;
            const dateObj = new Date(rawMonth + "-01");
            const monthName = dateObj.toLocaleString('en-IN', { month: 'long', year: 'numeric' });

            const logs = students.map((s, i) => ({
                name: s.name, contact: s.contact, batch: s.batch, fees: s.fees,
                feeType: document.getElementById(`type-${i}`).value,
                paidTo: document.getElementById(`pst-${i}`).value,
                paidAmount: document.getElementById(`paid-${i}`).value || 0,
                pending: document.getElementById(`pend-${i}`).innerText.replace('₹', ''),
                status: document.getElementById(`stat-${i}`).innerText,
                lastReminded: s.lastReminded || ""
            })).filter(r => parseFloat(r.paidAmount) > 0 || r.lastReminded !== "");

            if(!logs.length) return alert("Please mark someone as paid or send a reminder before syncing.");
            
            btn.innerText = "TRANSMITTING..."; btn.disabled = true;

            const fd = new URLSearchParams();
            fd.append('payload', JSON.stringify({ action: 'sync', month: monthName, data: logs }));
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: fd,
                    mode: 'no-cors' // This bypasses browser blocks
                });
                alert("Request Sent to Sheet! Check your Fees tab now.");
                loadStudents();
            } catch(e) { 
                alert("Error: " + e.message); 
            } finally { 
                btn.innerText = "Sync Ledger & Finalize"; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
